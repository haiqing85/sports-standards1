<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体育建设标准查询平台</title>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <style>
    /* ... 保持你之前的样式不变 ... */
    .std-code { font-weight: bold; color: #2563eb; margin-bottom: 4px; }
    .dl-btn-primary { background: #2563eb; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; display: inline-block; }
  </style>
</head>
<body>

  <script>
    let DB = [];
    let fuse;

    // 1. 初始化数据
    async function init() {
      try {
        const resp = await fetch('data/standards.json');
        const data = await resp.json();
        DB = data.standards;
        
        // 配置 Fuse.js，确保 code 的搜索权重最高
        fuse = new Fuse(DB, {
          keys: [
            { name: 'code', weight: 1.0 },
            { name: 'title', weight: 0.7 },
            { name: 'tags', weight: 0.5 }
          ],
          threshold: 0.3
        });
        
        renderList(DB);
      } catch (err) {
        console.error("数据加载失败", err);
      }
    }

    // 2. 渲染标准卡片
    function renderList(list) {
      const container = document.getElementById('listContainer');
      container.innerHTML = list.map(std => `
        <div class="card" onclick="openDetail('${std.id}')">
          <div class="std-code">${std.code}</div> <div class="std-title">${std.title}</div>
          <div class="std-tag">${std.type}</div>
        </div>
      `).join('');
    }

    // 3. 渲染详情弹窗（核心：修复 PDF 路径）
    function openDetail(id) {
      const std = DB.find(item => item.id === id);
      if (!std) return;

      // 自动构建 PDF 路径：如果字段里没有 localFile，则根据 ID 自动生成
      const pdfPath = std.localFile || `downloads/${std.id}.pdf`;

      const detailHtml = `
        <div class="detail-header">
          <h2>${std.title}</h2>
          <div class="std-code-large">${std.code}</div>
        </div>
        <div class="detail-info">
          <p><strong>发布日期：</strong>${std.issueDate || '未记录'}</p>
          <p><strong>标准状态：</strong><span class="status-tag">${std.status}</span></p>
          <p><strong>简介：</strong>${std.summary || '暂无简介'}</p>
        </div>
        
        <div class="download-section" style="margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px;">
          <h4 style="margin-bottom: 10px;">📄 文件下载与预览</h4>
          <div style="display: flex; gap: 10px;">
            <a href="${pdfPath}" target="_blank" class="dl-btn-primary">
              在线预览 PDF
            </a>
            <a href="${pdfPath}" download="${std.code}.pdf" class="dl-btn-secondary" 
               style="border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 6px; text-decoration: none; color: #475569;">
              下载原文件
            </a>
          </div>
          <p style="font-size: 12px; color: #94a3b8; margin-top: 8px;">
            提示：若无法打开，请检查文件名是否为 <strong>${std.id}.pdf</strong> 并已上传至 downloads 目录。
          </p>
        </div>
      `;
      
      document.getElementById('detailContent').innerHTML = detailHtml;
      document.getElementById('modal').style.display = 'block';
    }

    // 启动
    init();
  </script>
</body>
</html>
