<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体育标准数据库 - 管理后台</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        /* 登录页 */
        .login-screen { position: fixed; inset: 0; background: #1e293b; display: flex; align-items: center; justify-content: center; z-index: 999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box h2 { margin-top: 0; margin-bottom: 6px; color: #0f172a; font-size: 20px; }
        .login-box .sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
        .login-box label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .login-box input { width: 100%; padding: 11px 13px; margin-bottom: 14px; border: 1px solid #e2e8f0; border-radius: 7px; box-sizing: border-box; font-size: 14px; font-family: inherit; color: #1e293b; }
        .login-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; transition: background .2s; }
        .login-box button:hover { background: #1d4ed8; }
        .login-box button:disabled { opacity: .6; cursor: not-allowed; }
        .login-err { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 18px; }
        /* 主界面 */
        .container { max-width: 1100px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .header-bar h1 { margin: 0; font-size: 22px; color: #0f172a; }
        .header-btns { display: flex; gap: 10px; }
        .btn { padding: 9px 18px; border-radius: 7px; cursor: pointer; border: none; font-size: 14px; color: white; font-weight: 700; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-sync { background: #10b981; }
        .btn-sync:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: .6; cursor: not-allowed; }
        /* 搜索和筛选 */
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-bar input { flex: 1; min-width: 200px; padding: 9px 13px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13.5px; font-family: inherit; outline: none; color: #1e293b; }
        .search-bar input:focus { border-color: var(--primary); }
        .search-bar select { padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; color: #1e293b; cursor: pointer; background: white; }
        /* 列表 */
        .std-item { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f1f5f9; align-items: center; transition: background .15s; }
        .std-item:hover { background: #f8fafc; }
        .std-item:last-child { border-bottom: none; }
        .std-info-code { font-weight: 700; color: #0f172a; font-size: 15px; font-family: monospace; margin-bottom: 4px; }
        .std-info-title { font-size: 13.5px; color: #475569; margin-bottom: 8px; font-weight: 500; }
        .std-item-btns { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-right: 5px; }
        .badge-type  { background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .badge-mand  { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .badge-cat   { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .badge-ok    { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .badge-abol  { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        /* 弹窗 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
        .modal.open { display: flex; }
        .modal-content { background: white; padding: 28px; border-radius: 12px; width: 560px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: mup .18s ease; }
        @keyframes mup { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .modal-content h2 { margin-top: 0; margin-bottom: 20px; color: #0f172a; font-size: 18px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.4px; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 7px;
            box-sizing: border-box; font-family: inherit; font-size: 13.5px; color: #1e293b; background: white;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        .input-group input[readonly] { background: #f8fafc; color: #64748b; cursor: not-allowed; }
        .hint { font-size: 11px; color: #64748b; margin-top: 4px; display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #f1f5f9; }
        /* 状态提示 */
        #statusText { margin-bottom: 14px; color: #64748b; font-size: 14px; }
        .stat-card.nopdf .s-num { color: #ea580c; }
        .stat-card.nopdf.selected { border-color: #ea580c; background: #fff7ed; }
        .badge-nopdf { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; border-radius: 20px; font-size: 11px; font-weight: 700; padding: 2px 8px; display: inline-flex; align-items: center; gap: 3px; }
        .upload-hint { font-size: 11px; color: #ea580c; margin-top: 3px; }
        /* 统计卡片 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 9px; padding: 14px 16px; text-align: center; cursor: pointer; transition: all .15s; user-select: none; }
        .stat-card:hover { border-color: #2563eb; box-shadow: 0 2px 10px rgba(37,99,235,.12); transform: translateY(-1px); }
        .stat-card.selected { border-width: 2px; box-shadow: 0 2px 10px rgba(37,99,235,.15); }
        .stat-card.total.selected  { border-color: #2563eb; background: #eff6ff; }
        .stat-card.active.selected { border-color: #16a34a; background: #f0fdf4; }
        .stat-card.abol.selected   { border-color: #dc2626; background: #fef2f2; }
        .stat-card.coming.selected { border-color: #d9706; background: #fffbeb; }
        .stat-card .s-num { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-card .s-lbl { font-size: 12px; color: #94a3b8; }
        .stat-card.total  .s-num { color: #2563eb; }
        .stat-card.active .s-num { color: #16a34a; }
        .stat-card.abol   .s-num { color: #dc2626; }
        .stat-card.coming .s-num { color: #d9706; }
        /* PDF上传区 */
        .pdf-upload-area { border: 2px dashed #e2e8f0; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: all .2s; background: #f8fafc; }
        .pdf-upload-area:hover, .pdf-upload-area.dragover { border-color: #2563eb; background: rgba(37,99,235,.04); }
        .pdf-upload-area .pu-icon { font-size: 28px; margin-bottom: 6px; }
        .pdf-upload-area .pu-text { font-size: 13px; color: #475569; }
        .pdf-upload-area .pu-hint { font-size: 11px; color: #94a3b8; margin-top: 3px; }
        .pdf-status-bar { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 8px 11px; border-radius: 6px; font-size: 12.5px; }
        .pdf-status-bar.has  { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .pdf-status-bar.none { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .pdf-status-bar.uploading { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .pdf-status-bar.error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        /* 多选分类 */
        .cat-box { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; }
        .cat-item { display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; cursor: pointer; font-size: 13px; color: #475569; transition: all .15s; user-select: none; }
        .cat-item:hover { border-color: #2563eb; color: #2563eb; }
        .cat-item input[type="checkbox"] { accent-color: #2563eb; cursor: pointer; width: 14px; height: 14px; }
        .cat-item:has(input:checked) { background: #dbeafe; border-color: #2563eb; color: #1d4ed8; font-weight: 600; }
        /* 标签页导航 */
        .tab-nav { display:flex; gap:0; border-bottom:2px solid #e2e8f0; margin-bottom:24px; }
        .tab-btn { padding:10px 22px; font-size:14px; font-weight:600; cursor:pointer; background:none; border:none; border-bottom:3px solid transparent; margin-bottom:-2px; color:#94a3b8; font-family:inherit; transition:all .15s; }
        .tab-btn:hover { color:#2563eb; }
        .tab-btn.active { color:#2563eb; border-bottom-color:#2563eb; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
    </style>
</head>
<body>
<!-- 登录页 -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h2>🏟 体育标准管理后台</h2>
        <div class="sub">请输入管理员密码登录</div>
        <label>管理员密码</label>
        <input type="password" id="adminPassword" placeholder="请输入环境变量里的ADMIN_PASSWORD"
            onkeydown="if(event.key==='Enter')checkLogin()">
        <button onclick="checkLogin()" id="loginBtn">登 录</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- 主界面 -->
<div class="container" id="adminScreen">
    <div class="header-bar">
        <h1>🏟 体育标准管理后台</h1>
        <div class="header-btns">
            <button class="btn btn-primary" onclick="openModal()">➕ 新增标准</button>
            <button class="btn btn-sync" onclick="syncToGithub()" id="syncBtn">☁️ 推送至 GitHub</button>
        </div>
    </div>

    <!-- 标签导航 -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('std',this)">📋 标准数据管理</button>
        <button class="tab-btn" onclick="switchTab('ad',this)">📢 广告与SEO配置</button>
    </div>

    <!-- Tab 1: 标准管理 -->
    <div class="tab-panel active" id="tab-std">
        <div id="statusText">正在连接 GitHub 并加载数据…</div>
        <!-- 统计面板 -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card total" onclick="filterByCard('')" title="点击查看全部标准">
                <div class="s-num" id="st-total">—</div><div class="s-lbl">收录标准（全部）</div>
            </div>
            <div class="stat-card active" onclick="filterByCard('现行')" title="点击查看现行标准">
                <div class="s-num" id="st-active">—</div><div class="s-lbl">现行有效 ↓点击查看</div>
            </div>
            <div class="stat-card abol" onclick="filterByCard('废止')" title="点击查看已废止标准">
                <div class="s-num" id="st-abol">—</div><div class="s-lbl">已废止 ↓点击查看</div>
            </div>
            <div class="stat-card nopdf" onclick="filterByCard('__nopdf__')" title="点击查看缺少PDF的标准">
                <div class="s-num" id="st-nopdf">—</div><div class="s-lbl">⚠️ 缺PDF ↓点击补传</div>
            </div>
        </div>
        <!-- 搜索筛选 -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 搜索标准编号、名称…" oninput="renderList()">
            <select id="filterType" onchange="renderList()">
                <option value="">全部类型</option>
                <option>国家标准</option><option>行业标准</option>
                <option>地方标准</option><option>团标</option><option>企业标准</option>
            </select>
            <select id="filterStatus" onchange="window._filterNoPdf=false;renderList()">
                <option value="">全部状态</option>
                <option>现行</option><option>废止</option><option>即将实施</option>
            </select>
            <select id="filterCat" onchange="renderList()">
                <option value="">全部分类</option>
                <option>合成材料面层</option><option>人造草坪</option><option>灯光照明</option>
                <option>木地板</option><option>PVC运动地胶</option><option>围网</option>
                <option>健身路径</option><option>体育器材</option><option>颗粒填充料</option>
                <option>运动地板</option><option>场地设计</option><option>游泳场地</option>
                <option>综合</option>
            </select>
        </div>
        <div id="list"></div>
    </div>

    <!-- Tab 2: 广告与SEO配置 -->
    <div class="tab-panel" id="tab-ad">
        <div style="padding:20px 0;">
            <h3>广告与SEO配置功能</h3>
            <p>此处可配置广告代码、统计代码，保存后自动同步到GitHub，无需手动修改前台页面</p>
        </div>
    </div>
</div>

<!-- 新增/编辑标准弹窗 -->
<div class="modal" id="stdModal">
    <div class="modal-content">
        <h2 id="modalTitle">新增标准</h2>
        <form id="stdForm" onsubmit="saveStd(event)">
            <div class="grid-2">
                <div class="input-group">
                    <label>标准编号</label>
                    <input type="text" id="stdCode" required placeholder="如：GB 36246-2018">
                </div>
                <div class="input-group">
                    <label>标准类型</label>
                    <select id="stdType" required>
                        <option>国家标准</option><option>行业标准</option>
                        <option>地方标准</option><option>团标</option><option>企业标准</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>标准名称</label>
                <input type="text" id="stdName" required placeholder="标准中文全称">
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>实施日期</label>
                    <input type="date" id="stdDate" required>
                </div>
                <div class="input-group">
                    <label>标准状态</label>
                    <select id="stdStatus" required>
                        <option>现行</option><option>废止</option><option>即将实施</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>所属分类（可多选）</label>
                <div class="cat-box" id="catBox">
                    <label class="cat-item"><input type="checkbox" value="合成材料面层"> 合成材料面层</label>
                    <label class="cat-item"><input type="checkbox" value="人造草坪"> 人造草坪</label>
                    <label class="cat-item"><input type="checkbox" value="灯光照明"> 灯光照明</label>
                    <label class="cat-item"><input type="checkbox" value="木地板"> 木地板</label>
                    <label class="cat-item"><input type="checkbox" value="PVC运动地胶"> PVC运动地胶</label>
                    <label class="cat-item"><input type="checkbox" value="围网"> 围网</label>
                    <label class="cat-item"><input type="checkbox" value="健身路径"> 健身路径</label>
                    <label class="cat-item"><input type="checkbox" value="体育器材"> 体育器材</label>
                </div>
            </div>
            <div class="input-group">
                <label>是否强制性标准</label>
                <select id="stdMandatory">
                    <option value="false">推荐性</option>
                    <option value="true">强制性</option>
                </select>
            </div>
            <div class="input-group">
                <label>PDF文件上传</label>
                <div class="pdf-upload-area" id="pdfUploadArea" onclick="document.getElementById('pdfFileInput').click()">
                    <div class="pu-icon">📄</div>
                    <div class="pu-text">点击或拖拽PDF文件到此处上传</div>
                    <div class="pu-hint">仅支持PDF文件，最大50MB</div>
                </div>
                <input type="file" id="pdfFileInput" accept=".pdf" style="display:none" onchange="handlePdfSelect(event)">
                <div class="pdf-status-bar none" id="pdfStatusBar">
                    <span id="pdfStatusText">未上传PDF文件</span>
                </div>
            </div>
            <div class="input-group">
                <label>官方发布链接</label>
                <input type="url" id="stdUrl" placeholder="标准官方发布页面链接">
            </div>
            <div class="input-group">
                <label>备注说明</label>
                <textarea id="stdDesc" rows="3" placeholder="可选，补充说明、替代关系等"></textarea>
            </div>
            <input type="hidden" id="editIndex">
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存标准</button>
            </div>
        </form>
    </div>
</div>

<script>
// ========== 核心配置 ==========
const GITHUB_REPO = 'haiqing85/sports-standards1';
const DATA_FILE = 'data/standards.json';
const PROXY_API = '/api/github-proxy';
// 全局存储当前登录的密码（仅内存中，不持久化）
let CURRENT_ADMIN_PASSWORD = '';
let stdList = [];
let currentFileSha = '';
let currentPdfBase64 = '';
let currentPdfName = '';
window._filterNoPdf = false;

// ========== 登录逻辑（修复无响应问题） ==========
async function checkLogin() {
    const passwordInput = document.getElementById('adminPassword');
    const loginBtn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginErr');
    
    const password = passwordInput.value.trim();
    if (!password) {
        errEl.innerText = '请输入管理员密码';
        return;
    }

    // 按钮禁用，防止重复点击
    loginBtn.disabled = true;
    loginBtn.innerText = '正在登录…';
    errEl.innerText = '';

    try {
        // 请求服务端校验密码
        const response = await fetch(`${PROXY_API}/login-check`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password })
        });

        const result = await response.json();
        if (result.success) {
            // 登录成功
            CURRENT_ADMIN_PASSWORD = password;
            localStorage.setItem('admin_logged', '1');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminScreen').style.display = 'block';
            initAdmin();
        } else {
            // 密码错误
            errEl.innerText = result.message || '密码错误，请重试';
        }
    } catch (error) {
        // 网络/接口错误
        errEl.innerText = `登录失败：${error.message}，请检查代理接口是否正常部署`;
        console.error('登录错误', error);
    } finally {
        // 恢复按钮状态
        loginBtn.disabled = false;
        loginBtn.innerText = '登 录';
    }
}

// 页面加载检查登录状态
window.onload = function() {
    // PDF拖拽事件初始化
    initPdfDrag();
    // 之前登录过，直接进入后台
    if (localStorage.getItem('admin_logged') === '1') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        initAdmin();
    }
};

// ========== 核心GitHub请求方法 ==========
async function githubRequest(path, method = 'GET', body = null) {
    const url = `${PROXY_API}/repos/${GITHUB_REPO}/contents/${path}`;
    const options = {
        method: method,
        headers: {
            'X-Admin-Password': CURRENT_ADMIN_PASSWORD,
            'Content-Type': 'application/json'
        }
    };

    if (body) {
        options.body = JSON.stringify(body);
    }

    try {
        const response = await fetch(url, options);
        const result = await response.json();
        if (!response.ok) {
            throw new Error(result.message || result.error || 'GitHub请求失败');
        }
        return result;
    } catch (error) {
        console.error('GitHub请求错误:', error);
        throw error;
    }
}

// ========== 初始化后台 ==========
async function initAdmin() {
    await loadData();
    renderList();
    updateStats();
}

// ========== 加载标准数据 ==========
async function loadData() {
    try {
        document.getElementById('statusText').innerText = '正在加载标准数据…';
        const result = await githubRequest(DATA_FILE);
        currentFileSha = result.sha;
        // 修复中文解码
        const content = decodeURIComponent(escape(atob(result.content)));
        stdList = JSON.parse(content);
        document.getElementById('statusText').innerText = `数据加载完成，共 ${stdList.length} 条标准`;
    } catch (error) {
        document.getElementById('statusText').innerText = `数据加载失败: ${error.message}`;
        alert('数据加载失败，请检查密码是否正确、代理接口是否正常部署');
    }
}

// ========== 渲染列表 ==========
function renderList() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filterType = document.getElementById('filterType').value;
    const filterStatus = document.getElementById('filterStatus').value;
    const filterCat = document.getElementById('filterCat').value;
    const listEl = document.getElementById('list');

    let filtered = [...stdList];

    // 搜索过滤
    if (search) {
        filtered = filtered.filter(item => 
            item.code.toLowerCase().includes(search) || 
            item.name.toLowerCase().includes(search)
        );
    }
    // 类型过滤
    if (filterType) filtered = filtered.filter(item => item.type === filterType);
    // 状态过滤
    if (filterStatus) filtered = filtered.filter(item => item.status === filterStatus);
    // 分类过滤
    if (filterCat) filtered = filtered.filter(item => item.category && item.category.includes(filterCat));
    // 缺PDF过滤
    if (window._filterNoPdf) filtered = filtered.filter(item => !item.pdf);

    // 渲染
    if (filtered.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">暂无匹配的标准数据</div>';
        return;
    }

    listEl.innerHTML = filtered.map((item, index) => {
        const originalIndex = stdList.findIndex(i => i.code === item.code);
        const badges = `
            <span class="badge badge-type">${item.type}</span>
            ${item.mandatory === 'true' ? '<span class="badge badge-mand">强制性</span>' : ''}
            ${item.status === '现行' ? '<span class="badge badge-ok">现行</span>' : ''}
            ${item.status === '废止' ? '<span class="badge badge-abol">废止</span>' : ''}
            ${!item.pdf ? '<span class="badge-nopdf">⚠️ 缺PDF</span>' : ''}
        `;
        const categories = item.category ? item.category.map(c => `<span class="badge badge-cat">${c}</span>`).join('') : '';

        return `
        <div class="std-item">
            <div>
                <div class="std-info-code">${item.code} ${badges}</div>
                <div class="std-info-title">${item.name}</div>
                <div>${categories} <span style="font-size:12px;color:#94a3b8;">实施日期：${item.date}</span></div>
            </div>
            <div class="std-item-btns">
                <button class="btn btn-primary" onclick="editStd(${originalIndex})">编辑</button>
                <button class="btn btn-danger" onclick="deleteStd(${originalIndex})">删除</button>
            </div>
        </div>
        `;
    }).join('');
}

// ========== 统计更新 ==========
function updateStats() {
    const total = stdList.length;
    const active = stdList.filter(i => i.status === '现行').length;
    const abol = stdList.filter(i => i.status === '废止').length;
    const nopdf = stdList.filter(i => !i.pdf).length;

    document.getElementById('st-total').innerText = total;
    document.getElementById('st-active').innerText = active;
    document.getElementById('st-abol').innerText = abol;
    document.getElementById('st-nopdf').innerText = nopdf;
}

// ========== 卡片筛选 ==========
function filterByCard(status) {
    document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('selected'));
    event.currentTarget.classList.add('selected');

    if (status === '__nopdf__') {
        window._filterNoPdf = true;
        document.getElementById('filterStatus').value = '';
    } else {
        window._filterNoPdf = false;
        document.getElementById('filterStatus').value = status;
    }
    renderList();
}

// ========== 标签页切换 ==========
function switchTab(tabName, btnEl) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    btnEl.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
    document.getElementById(`tab-${tabName}`).classList.add('active');
}

// ========== 弹窗操作 ==========
function openModal(editIndex = -1) {
    document.getElementById('modalTitle').innerText = editIndex >= 0 ? '编辑标准' : '新增标准';
    document.getElementById('editIndex').value = editIndex;
    document.getElementById('stdForm').reset();
    currentPdfBase64 = '';
    currentPdfName = '';
    updatePdfStatus('none', '未上传PDF文件');

    // 编辑模式填充数据
    if (editIndex >= 0) {
        const item = stdList[editIndex];
        document.getElementById('stdCode').value = item.code;
        document.getElementById('stdName').value = item.name;
        document.getElementById('stdType').value = item.type;
        document.getElementById('stdDate').value = item.date;
        document.getElementById('stdStatus').value = item.status;
        document.getElementById('stdMandatory').value = item.mandatory || 'false';
        document.getElementById('stdUrl').value = item.url || '';
        document.getElementById('stdDesc').value = item.desc || '';

        // 填充分类
        if (item.category) {
            document.querySelectorAll('#catBox input').forEach(cb => {
                cb.checked = item.category.includes(cb.value);
            });
        }
        // PDF状态
        if (item.pdf) updatePdfStatus('has', `已上传PDF：${item.pdf}`);
    }
    document.getElementById('stdModal').classList.add('open');
}

function closeModal() {
    document.getElementById('stdModal').classList.remove('open');
}

// ========== PDF处理 ==========
function initPdfDrag() {
    const pdfArea = document.getElementById('pdfUploadArea');
    pdfArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        pdfArea.classList.add('dragover');
    });
    pdfArea.addEventListener('dragleave', () => {
        pdfArea.classList.remove('dragover');
    });
    pdfArea.addEventListener('drop', (e) => {
        e.preventDefault();
        pdfArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length && files[0].type === 'application/pdf') {
            handlePdfFile(files[0]);
        } else {
            alert('请上传PDF格式的文件');
        }
    });
}

function handlePdfSelect(e) {
    const file = e.target.files[0];
    if (file) handlePdfFile(file);
}

function handlePdfFile(file) {
    if (file.type !== 'application/pdf') {
        alert('请上传PDF格式的文件');
        return;
    }
    if (file.size > 50 * 1024 * 1024) {
        alert('文件大小不能超过50MB');
        return;
    }

    updatePdfStatus('uploading', '正在读取PDF文件…');
    const reader = new FileReader();
    reader.onload = function(e) {
        currentPdfBase64 = e.target.result.split(',')[1];
        currentPdfName = `${document.getElementById('stdCode').value || Date.now()}.pdf`;
        updatePdfStatus('has', `PDF文件已就绪：${currentPdfName}`);
    };
    reader.onerror = function() {
        updatePdfStatus('error', 'PDF文件读取失败，请重试');
    };
    reader.readAsDataURL(file);
}

function updatePdfStatus(type, text) {
    const bar = document.getElementById('pdfStatusBar');
    bar.className = `pdf-status-bar ${type}`;
    document.getElementById('pdfStatusText').innerText = text;
}

// ========== 保存标准 ==========
async function saveStd(e) {
    e.preventDefault();
    const editIndex = parseInt(document.getElementById('editIndex').value);
    const code = document.getElementById('stdCode').value;
    const name = document.getElementById('stdName').value;

    // 检查编号重复
    const exists = stdList.some((item, idx) => item.code === code && idx !== editIndex);
    if (exists) {
        alert('该标准编号已存在，请勿重复添加');
        return;
    }

    // 收集分类
    const category = [];
    document.querySelectorAll('#catBox input:checked').forEach(cb => {
        category.push(cb.value);
    });

    // 构造标准对象
    const stdItem = {
        code,
        name,
        type: document.getElementById('stdType').value,
        date: document.getElementById('stdDate').value,
        status: document.getElementById('stdStatus').value,
        mandatory: document.getElementById('stdMandatory').value,
        category,
        url: document.getElementById('stdUrl').value,
        desc: document.getElementById('stdDesc').value,
        pdf: stdList[editIndex]?.pdf || ''
    };

    try {
        // 上传PDF
        if (currentPdfBase64) {
            const pdfPath = `pdf/${currentPdfName}`;
            await githubRequest(pdfPath, 'PUT', {
                message: `上传PDF：${currentPdfName}`,
                content: currentPdfBase64
            });
            stdItem.pdf = currentPdfName;
        }

        // 更新列表
        if (editIndex >= 0) {
            stdList[editIndex] = stdItem;
        } else {
            stdList.unshift(stdItem);
        }

        // 同步到GitHub
        await syncToGithub(false);
        closeModal();
        renderList();
        updateStats();
        alert('标准保存成功！');
    } catch (error) {
        alert(`保存失败：${error.message}`);
    }
}

// ========== 编辑/删除标准 ==========
function editStd(index) {
    openModal(index);
}

async function deleteStd(index) {
    const item = stdList[index];
    if (!confirm(`确定要删除标准「${item.code} ${item.name}」吗？此操作不可恢复`)) {
        return;
    }

    try {
        stdList.splice(index, 1);
        await syncToGithub(false);
        renderList();
        updateStats();
        alert('删除成功！');
    } catch (error) {
        alert(`删除失败：${error.message}`);
    }
}

// ========== 同步到GitHub ==========
async function syncToGithub(showAlert = true) {
    const syncBtn = document.getElementById('syncBtn');
    syncBtn.disabled = true;
    syncBtn.innerText = '正在同步…';

    try {
        // 修复中文编码
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(stdList, null, 2))));
        await githubRequest(DATA_FILE, 'PUT', {
            message: '后台更新标准数据',
            content: content,
            sha: currentFileSha
        });

        // 重新获取sha
        const newResult = await githubRequest(DATA_FILE);
        currentFileSha = newResult.sha;

        syncBtn.innerText = '☁️ 推送至 GitHub';
        syncBtn.disabled = false;
        if (showAlert) alert('同步成功！数据已更新到GitHub仓库');
    } catch (error) {
        syncBtn.innerText = '☁️ 推送至 GitHub';
        syncBtn.disabled = false;
        throw error;
    }
}
</script>
