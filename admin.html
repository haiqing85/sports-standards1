<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体育标准管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
/* 登录 */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lb{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.lb h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.lb .sub{font-size:13px;color:#94a3b8;text-align:center;margin-bottom:28px}
.lb label{display:block;font-size:12px;font-weight:700;color:#475569;margin:14px 0 5px;text-transform:uppercase;letter-spacing:.5px}
.lb input{width:100%;padding:10px 13px;border:1px solid #e2e8f0;border-radius:7px;font-size:14px;outline:none;background:#f8fafc;color:#1e293b}
.lb input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.hint{font-size:12px;color:#94a3b8;background:#f8fafc;border-radius:6px;padding:10px 12px;margin-top:16px;line-height:1.7}
.hint code{background:#e2e8f0;border-radius:3px;padding:1px 5px;font-family:monospace}
.hint a{color:#2563eb}
.btn-login{width:100%;margin-top:20px;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:7px;font-size:15px;font-weight:700;cursor:pointer}
.btn-login:hover{background:#1d4ed8}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.lerr{color:#dc2626;font-size:13px;text-align:center;margin-top:10px;min-height:18px}
/* 主界面 */
.app{display:none;flex-direction:column;min-height:100vh}
.app.show{display:flex}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topbar-title{font-size:16px;font-weight:700}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sync{font-size:12px;padding:4px 10px;border-radius:20px;background:#f1f5f9;color:#94a3b8}
.sync.ok{background:#dcfce7;color:#16a34a}
.sync.err{background:#fee2e2;color:#dc2626}
.sync.ing{background:#fef3c7;color:#d97706}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;font-family:inherit}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-gray{background:#fff;color:#475569;border:1px solid #e2e8f0}.btn-gray:hover{border-color:#2563eb;color:#2563eb}
.btn-red{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}.btn-red:hover{background:#fecaca}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-logout{padding:6px 12px;border:1px solid #e2e8f0;background:none;color:#475569;font-size:13px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-logout:hover{border-color:#dc2626;color:#dc2626}
/* 内容 */
.content{flex:1;padding:24px;max-width:1400px;margin:0 auto;width:100%}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.sc{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;text-align:center}
.sc-n{font-size:28px;font-weight:700;line-height:1}
.sc-n.blue{color:#2563eb}.sc-n.green{color:#16a34a}.sc-n.red{color:#dc2626}.sc-n.amber{color:#d97706}
.sc-l{font-size:12px;color:#94a3b8;margin-top:5px}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px;max-width:300px}
.sw input{width:100%;padding:8px 12px 8px 30px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;background:#fff}
.sw input:focus{border-color:#2563eb}
.sw-i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px;pointer-events:none}
.fsel{padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;background:#fff;color:#1e293b;cursor:pointer}
/* 表格 */
.tw{background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:#f8fafc;padding:10px 13px;text-align:left;font-size:11px;font-weight:700;color:#475569;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #e2e8f0;white-space:nowrap}
tbody td{padding:10px 13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;font-size:13px}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}
.tc{font-family:"Courier New",monospace;font-weight:700;color:#2563eb;font-size:11.5px;white-space:nowrap}
.tt{font-weight:600;max-width:260px;line-height:1.4}
.tt small{display:block;font-weight:400;color:#94a3b8;font-size:11px;margin-top:1px}
.tact{display:flex;gap:5px;white-space:nowrap}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b1{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
.b2{background:#ede9fe;color:#6d28d9;border:1px solid #c4b5fd}
.b3{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.b4{background:#ffedd5;color:#c2410c;border:1px solid #fed7aa}
.b5{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.bs1{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0}
.bs2{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.bs3{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.pd{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.pd.y{background:#16a34a}.pd.n{background:#cbd5e1}
.pager{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-top:1px solid #f1f5f9;font-size:12.5px;color:#94a3b8}
.pbtns{display:flex;gap:4px}
.pb{width:30px;height:30px;border:1px solid #e2e8f0;border-radius:5px;background:#fff;color:#475569;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.pb:hover,.pb.active{border-color:#2563eb;color:#2563eb;background:rgba(37,99,235,.08)}
.pb.active{font-weight:700}
/* 弹窗 */
.mo{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.mbox{background:#fff;border-radius:12px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mup .18s ease}
@keyframes mup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9;position:sticky;top:0;background:#fff;z-index:1}
.mh h2{font-size:16px;font-weight:700}
.mcl{width:28px;height:28px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#475569}
.mcl:hover{background:#dc2626;border-color:#dc2626;color:#fff}
.mb{padding:20px}
.mf{padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
/* 表单 */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.ff{grid-column:1/-1}
.fg .fg-item{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:12px;font-weight:700;color:#475569}
.req{color:#dc2626}
.fg input,.fg select,.fg textarea{padding:8px 11px;border:1px solid #e2e8f0;border-radius:6px;font-size:13.5px;outline:none;font-family:inherit;color:#1e293b;background:#fff}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.fg textarea{resize:vertical;min-height:76px}
.rr{display:flex;gap:20px;padding:6px 0}
.rr label{font-size:13.5px;font-weight:400;display:flex;align-items:center;gap:5px;cursor:pointer}
.dz{border:2px dashed #e2e8f0;border-radius:7px;padding:18px;text-align:center;cursor:pointer;transition:all .2s}
.dz:hover,.dz.drag{border-color:#2563eb;background:rgba(37,99,235,.05)}
.dz p{font-size:12.5px;color:#94a3b8;margin-top:5px}
.pi{display:none;align-items:center;gap:8px;padding:9px 13px;background:#dcfce7;border:1px solid #bbf7d0;border-radius:6px;margin-top:8px;font-size:13px;color:#16a34a}
.pi.show{display:flex}
.dw{background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px;color:#b91c1c}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:9px;font-size:13.5px;font-weight:600;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{display:block}
.toast.ok{background:#16a34a}.toast.err{background:#dc2626}
.empty{text-align:center;padding:50px 20px;color:#94a3b8}
.empty .ei{font-size:36px;margin-bottom:10px}
@media(max-width:768px){
  .topbar{padding:0 14px}.content{padding:14px}.fg{grid-template-columns:1fr}
  thead th:nth-child(4),tbody td:nth-child(4),thead th:nth-child(6),tbody td:nth-child(6),thead th:nth-child(7),tbody td:nth-child(7){display:none}
}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="lw" id="loginWrap">
  <div class="lb">
    <h1>🏟 体育标准管理后台</h1>
    <div class="sub">Sports Standards Admin Panel</div>
    <label>GitHub 用户名</label>
    <input type="text" id="inUser" placeholder="如 haiqing85" autocomplete="username">
    <label>仓库名称</label>
    <input type="text" id="inRepo" placeholder="如 sports-standards1">
    <label>Personal Access Token</label>
    <input type="password" id="inToken" placeholder="ghp_xxxxxxxxxxxxxxxx">
    <div class="hint">
      需要 <code>repo</code> 权限的 Token。<br>
      获取方法：GitHub → Settings → Developer settings →
      <a href="https://github.com/settings/tokens/new" target="_blank">Personal access tokens</a>
      → 勾选 <code>repo</code> → Generate token。<br>
      <strong>账号信息仅保存在本地浏览器，不会上传到任何服务器。</strong>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>

<!-- 主界面 -->
<div class="app" id="mainApp">
  <header class="topbar">
    <div class="topbar-title">🏟 体育标准管理后台</div>
    <div class="topbar-right">
      <span class="sync" id="syncLabel">未同步</span>
      <button class="btn btn-gray" onclick="loadData()">↻ 刷新</button>
      <button class="btn btn-blue" onclick="openAdd()">＋ 新增标准</button>
      <button class="btn btn-gray" onclick="doExport()">↓ 导出 JSON</button>
      <button class="btn-logout" onclick="doLogout()">退出</button>
    </div>
  </header>
  <div class="content">
    <div class="stats" id="statsArea"></div>
    <div class="toolbar">
      <div class="sw">
        <span class="sw-i">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索编号、名称、关键词…" oninput="renderTable()">
      </div>
      <select class="fsel" id="filterType" onchange="renderTable()">
        <option value="">全部类型</option>
        <option>国家标准</option><option>行业标准</option>
        <option>地方标准</option><option>团标</option><option>企业标准</option>
      </select>
      <select class="fsel" id="filterCat" onchange="renderTable()"><option value="">全部分类</option></select>
      <select class="fsel" id="filterStatus" onchange="renderTable()">
        <option value="">全部状态</option>
        <option>现行</option><option>废止</option><option>即将实施</option>
      </select>
      <select class="fsel" id="filterPdf" onchange="renderTable()">
        <option value="">PDF 状态</option>
        <option value="yes">有 PDF</option><option value="no">缺 PDF</option>
      </select>
    </div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>标准编号</th><th>标准名称</th><th>类型</th><th>分类</th>
            <th>状态</th><th>PDF</th><th>发布日期</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pager" id="pagerArea"></div>
    </div>
  </div>
</div>

<!-- 新增/编辑弹窗 -->
<div class="mo" id="editModal" onclick="bgClose(event,'editModal')">
  <div class="mbox">
    <div class="mh">
      <h2 id="editTitle">新增标准</h2>
      <button class="mcl" onclick="closeMo('editModal')">✕</button>
    </div>
    <div class="mb">
      <div class="fg">
        <div class="fg-item"><label>标准编号 <span class="req">*</span></label><input type="text" id="fCode" placeholder="如 GB 36246-2018"></div>
        <div class="fg-item"><label>标准类型 <span class="req">*</span></label>
          <select id="fType"><option>国家标准</option><option>行业标准</option><option>地方标准</option><option>团标</option><option>企业标准</option></select></div>
        <div class="fg-item ff"><label>标准名称（中文）<span class="req">*</span></label><input type="text" id="fTitle" placeholder="如 中小学合成材料面层运动场地"></div>
        <div class="fg-item ff"><label>标准名称（英文）</label><input type="text" id="fEnglish" placeholder="English title (optional)"></div>
        <div class="fg-item"><label>标准状态 <span class="req">*</span></label>
          <select id="fStatus"><option>现行</option><option>废止</option><option>即将实施</option></select></div>
        <div class="fg-item"><label>标准分类 <span class="req">*</span></label>
          <select id="fCategory"><option>合成材料面层</option><option>人造草坪</option><option>灯光照明</option><option>木地板</option><option>PVC运动地胶</option><option>围网</option><option>健身路径</option><option>体育器材</option><option>颗粒填充料</option><option>游泳场地</option><option>运动地板</option><option>场地设计</option><option>体育设施</option><option>综合</option></select></div>
        <div class="fg-item"><label>发布日期</label><input type="date" id="fIssueDate"></div>
        <div class="fg-item"><label>实施日期</label><input type="date" id="fImplDate"></div>
        <div class="fg-item"><label>废止日期</label><input type="date" id="fAbolDate"></div>
        <div class="fg-item"><label>强制性</label>
          <div class="rr"><label><input type="radio" name="mand" value="false" checked> 推荐性标准</label><label><input type="radio" name="mand" value="true"> 强制性标准</label></div></div>
        <div class="fg-item ff"><label>发布机构</label><input type="text" id="fIssuedBy" placeholder="如 国家市场监督管理总局"></div>
        <div class="fg-item ff"><label>替代旧标准（本标准替代了哪个旧标准编号）</label><input type="text" id="fReplaces" placeholder="如 GB/T 14833-1993"></div>
        <div class="fg-item ff"><label>被新标准替代（该标准已被哪个新编号替代，废止时填）</label><input type="text" id="fReplacedBy" placeholder="如 GB 36246-2018"></div>
        <div class="fg-item ff"><label>关键词标签（用逗号分隔）</label><input type="text" id="fTags" placeholder="跑道, 塑胶, 中小学, 安全"></div>
        <div class="fg-item ff"><label>标准摘要 <span class="req">*</span></label><textarea id="fSummary" placeholder="简要描述标准规定的主要内容…"></textarea></div>
        <div class="fg-item ff"><label>适用范围</label><textarea id="fScope" placeholder="适用于……" style="min-height:56px"></textarea></div>
        <div class="fg-item ff">
          <label>上传 PDF 文件（可选）</label>
          <div class="dz" id="dropZone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
            <div style="font-size:24px">📂</div>
            <div style="font-size:13px;color:#475569;margin-top:6px">拖拽 PDF 文件到此处，或点击选择</div>
            <p>上传后用户可从本网站直接下载该标准文件</p>
            <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="handlePdfSelect(this)">
            <button type="button" class="btn btn-gray btn-sm" style="margin-top:10px" onclick="document.getElementById('pdfInput').click()">选择文件</button>
          </div>
          <div class="pi" id="pdfInfo"></div>
        </div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-gray" onclick="closeMo('editModal')">取消</button>
      <button class="btn btn-blue" id="saveBtn" onclick="saveStandard()">💾 保存</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="mo" id="delModal" onclick="bgClose(event,'delModal')">
  <div class="mbox" style="max-width:400px">
    <div class="mh"><h2>确认删除</h2><button class="mcl" onclick="closeMo('delModal')">✕</button></div>
    <div class="mb">
      <div class="dw">⚠️ 此操作不可撤销！</div>
      <p style="font-size:14px;line-height:1.7"><strong id="delCode"></strong><br><span id="delTitle" style="color:#475569"></span></p>
    </div>
    <div class="mf">
      <button class="btn btn-gray" onclick="closeMo('delModal')">取消</button>
      <button class="btn btn-red" onclick="confirmDelete()">🗑 确认删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 全局状态
var GH = {user:'', token:'', repo:''};
var DB = [], FT = [], curPage = 1, PS = 25;
var editingId = null, deletingId = null, pdfFile = null, jsonSha = '';

// DOM
function $(id){ return document.getElementById(id); }
function val(id){ return $(id).value.trim(); }
function setVal(id, v){ $(id).value = v||''; }
function lsGet(k){ return localStorage.getItem('spad_'+k)||''; }
function lsSet(k,v){ localStorage.setItem('spad_'+k, v); }

// 初始化
document.addEventListener('DOMContentLoaded', function(){
  var u = lsGet('user'), r = lsGet('repo');
  if(u) $('inUser').value = u;
  if(r) $('inRepo').value = r;
  $('inToken').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape'){
      ['editModal','delModal'].forEach(function(id){ if($(id).classList.contains('open')) closeMo(id); });
    }
  });
});

// 登录
function doLogin(){
  var u = val('inUser'), r = val('inRepo'), t = val('inToken');
  if(!u||!r||!t){ $('loginErr').textContent='请填写所有字段'; return; }
  var btn = $('loginBtn');
  btn.textContent='验证中…'; btn.disabled=true;
  $('loginErr').textContent='';
  fetch('https://api.github.com/repos/'+u+'/'+r, {
    headers:{'Authorization':'token '+t,'Accept':'application/vnd.github.v3+json'}
  }).then(function(res){
    if(!res.ok) return res.json().then(function(d){ throw new Error(d.message||'验证失败'); });
    return res.json();
  }).then(function(){
    GH = {user:u, token:t, repo:r};
    lsSet('user', u); lsSet('repo', r);
    $('loginWrap').style.display = 'none';
    $('mainApp').classList.add('show');
    loadData();
  }).catch(function(e){
    GH = {user:'', token:'', repo:''};
    $('loginErr').textContent = '登录失败：'+e.message;
  }).finally(function(){
    btn.textContent='登 录'; btn.disabled=false;
  });
}

function doLogout(){
  GH = {user:'', token:'', repo:''};
  $('mainApp').classList.remove('show');
  $('loginWrap').style.display='';
  $('inToken').value='';
}

// GitHub API
function ghBase(){ return 'https://api.github.com/repos/'+GH.user+'/'+GH.repo; }
function ghHdr(){ return {'Authorization':'token '+GH.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}; }

function ghGet(path){
  return fetch(ghBase()+path, {headers:ghHdr()}).then(function(r){
    if(!r.ok) return r.json().then(function(d){ throw new Error(d.message); });
    return r.json();
  });
}

function ghPut(path, body){
  return fetch(ghBase()+path, {method:'PUT', headers:ghHdr(), body:JSON.stringify(body)}).then(function(r){
    if(!r.ok) return r.json().then(function(d){ throw new Error(d.message); });
    return r.json();
  });
}

// 加载数据
function loadData(){
  setSyncLabel('ing','加载中…');
  ghGet('/contents/data/standards.json').then(function(file){
    jsonSha = file.sha;
    var raw = file.content.replace(/\n/g,'');
    var json = JSON.parse(decodeURIComponent(escape(atob(raw))));
    DB = json.standards||[];
    buildCatFilter(); renderStats(); renderTable();
    setSyncLabel('ok','已同步 '+DB.length+' 条');
  }).catch(function(e){
    setSyncLabel('err','加载失败');
    showToast('加载失败：'+e.message,'err');
  });
}

function saveData(msg){
  setSyncLabel('ing','保存中…');
  var today = new Date().toISOString().slice(0,10);
  var json = {version:today.replace(/-/g,'.'), updated:today, total:DB.length, standards:DB};
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(json,null,2))));
  return ghPut('/contents/data/standards.json', {message:msg, content:content, sha:jsonSha}).then(function(res){
    jsonSha = res.content.sha;
    setSyncLabel('ok','已保存 '+DB.length+' 条');
  });
}

// 统计
function renderStats(){
  var t=DB.length, a=DB.filter(function(s){return s.status==='现行';}).length;
  var ab=DB.filter(function(s){return s.status==='废止';}).length;
  var p=DB.filter(function(s){return s.localFile;}).length;
  $('statsArea').innerHTML='<div class="sc"><div class="sc-n blue">'+t+'</div><div class="sc-l">收录标准</div></div>'
    +'<div class="sc"><div class="sc-n green">'+a+'</div><div class="sc-l">现行有效</div></div>'
    +'<div class="sc"><div class="sc-n red">'+ab+'</div><div class="sc-l">已废止</div></div>'
    +'<div class="sc"><div class="sc-n amber">'+p+'</div><div class="sc-l">有PDF文件</div></div>';
}

function buildCatFilter(){
  var cats = [];
  DB.forEach(function(s){ if(s.category && cats.indexOf(s.category)<0) cats.push(s.category); });
  cats.sort();
  $('filterCat').innerHTML = '<option value="">全部分类</option>'+cats.map(function(c){return '<option>'+eh(c)+'</option>';}).join('');
}

// 类型对应class
function typeCls(t){
  var m={'国家标准':'b1','行业标准':'b2','地方标准':'b3','团标':'b4','企业标准':'b5'};
  return m[t]||'b1';
}
function statusCls(s){
  var m={'现行':'bs1','废止':'bs2','即将实施':'bs3'};
  return m[s]||'bs1';
}

// 筛选
function getFiltered(){
  var q=val('searchInput').toLowerCase(), tp=val('filterType'), cat=val('filterCat'), st=val('filterStatus'), pdf=val('filterPdf');
  return DB.filter(function(s){
    if(tp&&s.type!==tp) return false;
    if(cat&&s.category!==cat) return false;
    if(st&&s.status!==st) return false;
    if(pdf==='yes'&&!s.localFile) return false;
    if(pdf==='no'&&s.localFile) return false;
    if(q&&!(s.code+' '+s.title+' '+(s.tags||[]).join(' ')+' '+(s.summary||'')).toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderTable(){ FT=getFiltered(); curPage=1; renderPage(); }

function renderPage(){
  var sl = FT.slice((curPage-1)*PS, curPage*PS);
  if(!sl.length){
    $('tableBody').innerHTML='<tr><td colspan="8"><div class="empty"><div class="ei">🔍</div><p>未找到匹配的标准</p></div></td></tr>';
    $('pagerArea').innerHTML=''; return;
  }
  $('tableBody').innerHTML = sl.map(function(s){
    return '<tr>'
      +'<td class="tc">'+eh(s.code)+'</td>'
      +'<td class="tt">'+eh(s.title)+'<small>'+eh(s.issuedBy||'')+'</small></td>'
      +'<td><span class="badge '+typeCls(s.type)+'">'+eh(s.type)+'</span></td>'
      +'<td>'+eh(s.category||'—')+'</td>'
      +'<td><span class="badge '+statusCls(s.status)+'">'+eh(s.status)+'</span></td>'
      +'<td><span class="pd '+(s.localFile?'y':'n')+'"></span>'+(s.localFile?'有':'缺')+'</td>'
      +'<td>'+(s.issueDate||'—')+'</td>'
      +'<td class="tact">'
        +'<button class="btn btn-gray btn-sm" onclick="openEdit(\''+eh(s.id)+'\')">✏️ 编辑</button>'
        +'<button class="btn btn-red btn-sm" onclick="openDel(\''+eh(s.id)+'\')">🗑</button>'
      +'</td></tr>';
  }).join('');

  var tot = Math.ceil(FT.length/PS);
  if(tot<=1){ $('pagerArea').innerHTML='<span>共 '+FT.length+' 条</span><span></span>'; return; }
  var btns='';
  if(curPage>1) btns+='<button class="pb" onclick="goPage('+(curPage-1)+')">‹</button>';
  for(var i=1;i<=tot;i++){
    if(i===1||i===tot||Math.abs(i-curPage)<=1) btns+='<button class="pb'+(i===curPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    else if(Math.abs(i-curPage)===2) btns+='<span style="padding:0 3px;color:#94a3b8">…</span>';
  }
  if(curPage<tot) btns+='<button class="pb" onclick="goPage('+(curPage+1)+')">›</button>';
  $('pagerArea').innerHTML='<span>共 '+FT.length+' 条，第 '+curPage+'/'+tot+' 页</span><div class="pbtns">'+btns+'</div>';
}

function goPage(n){ curPage=n; renderPage(); }

// 新增/编辑
function openAdd(){
  editingId=null; pdfFile=null;
  $('editTitle').textContent='新增标准';
  $('saveBtn').textContent='💾 保存';
  clearForm(); openMo('editModal');
}

function openEdit(id){
  var s=DB.find(function(x){return x.id===id;});
  if(!s) return;
  editingId=id; pdfFile=null;
  $('editTitle').textContent='编辑标准';
  $('saveBtn').textContent='💾 更新';
  setVal('fCode',s.code); setVal('fTitle',s.title); setVal('fEnglish',s.english);
  setVal('fType',s.type); setVal('fStatus',s.status); setVal('fCategory',s.category);
  setVal('fIssueDate',s.issueDate); setVal('fImplDate',s.implementDate); setVal('fAbolDate',s.abolishDate);
  setVal('fIssuedBy',s.issuedBy); setVal('fReplaces',s.replaces); setVal('fReplacedBy',s.replacedBy);
  setVal('fTags',(s.tags||[]).join(', ')); setVal('fSummary',s.summary); setVal('fScope',s.scope);
  document.querySelectorAll('input[name="mand"]').forEach(function(r){ r.checked = r.value===String(s.isMandatory); });
  var pi=$('pdfInfo');
  if(s.localFile){ pi.className='pi show'; pi.textContent='✅ 已有PDF：'+s.localFile; }
  else{ pi.className='pi'; }
  openMo('editModal');
}

function clearForm(){
  ['fCode','fTitle','fEnglish','fIssueDate','fImplDate','fAbolDate','fIssuedBy','fReplaces','fReplacedBy','fTags','fSummary','fScope']
    .forEach(function(id){ setVal(id,''); });
  setVal('fType','国家标准'); setVal('fStatus','现行'); setVal('fCategory','合成材料面层');
  document.querySelector('input[name="mand"][value="false"]').checked=true;
  $('pdfInfo').className='pi'; $('pdfInput').value='';
}

function saveStandard(){
  var code=val('fCode'), title=val('fTitle'), summary=val('fSummary');
  if(!code||!title||!summary){ showToast('请填写编号、名称和摘要','err'); return; }
  var newId = editingId || code.replace(/[^A-Za-z0-9]/g,'').slice(0,30) || Date.now().toString(36);
  var entry = {
    id:newId, code:code, title:title, english:val('fEnglish'),
    type:val('fType'), status:val('fStatus'),
    issueDate:val('fIssueDate')||null, implementDate:val('fImplDate')||null, abolishDate:val('fAbolDate')||null,
    replaces:val('fReplaces')||null, replacedBy:val('fReplacedBy')||null,
    issuedBy:val('fIssuedBy'), category:val('fCategory'),
    tags:val('fTags').split(',').map(function(t){return t.trim();}).filter(Boolean),
    summary:summary,
    isMandatory:document.querySelector('input[name="mand"]:checked').value==='true',
    scope:val('fScope'),
    localFile:pdfFile?'downloads/'+newId+'.pdf':(editingId?(DB.find(function(s){return s.id===editingId;})||{}).localFile||null:null)
  };
  var btn=$('saveBtn');
  btn.disabled=true; btn.textContent='保存中…';
  var doSave = function(){
    if(editingId){
      var idx=DB.findIndex(function(s){return s.id===editingId;});
      if(idx>=0) DB[idx]=entry;
    } else {
      if(DB.find(function(s){return s.code.replace(/\s/g,'')===code.replace(/\s/g,'');})){
        showToast('该标准编号已存在','err'); btn.disabled=false; btn.textContent='💾 保存'; return Promise.reject(new Error('重复'));
      }
      DB.unshift(entry);
    }
    return saveData((editingId?'✏️ 编辑':'➕ 新增')+'标准: '+code).then(function(){
      renderStats(); buildCatFilter(); renderTable();
      closeMo('editModal');
      showToast(editingId?'✅ 更新成功':'✅ 新增成功','ok');
    });
  };
  var p = pdfFile ? uploadPdf(newId, pdfFile).then(doSave) : doSave();
  p.catch(function(e){ if(e.message!=='重复') showToast('保存失败：'+e.message,'err'); })
   .finally(function(){ btn.disabled=false; btn.textContent=editingId?'💾 更新':'💾 保存'; });
}

// 删除
function openDel(id){
  var s=DB.find(function(x){return x.id===id;});
  if(!s) return;
  deletingId=id; $('delCode').textContent=s.code; $('delTitle').textContent=s.title;
  openMo('delModal');
}

function confirmDelete(){
  if(!deletingId) return;
  DB=DB.filter(function(s){return s.id!==deletingId;});
  saveData('🗑 删除标准').then(function(){
    renderStats(); buildCatFilter(); renderTable();
    closeMo('delModal'); showToast('已删除','ok');
  }).catch(function(e){ showToast('删除失败：'+e.message,'err'); });
  deletingId=null;
}

// PDF
function handlePdfSelect(input){
  var f=input.files[0];
  if(!f||!f.name.endsWith('.pdf')){ showToast('请选择 PDF 文件','err'); return; }
  pdfFile=f;
  var pi=$('pdfInfo'); pi.className='pi show';
  pi.textContent='✅ 已选择：'+f.name+'（'+(f.size/1024).toFixed(0)+' KB）';
}

function handleDrop(e){
  e.preventDefault(); $('dropZone').classList.remove('drag');
  var f=e.dataTransfer.files[0];
  if(f&&f.name.endsWith('.pdf')){ pdfFile=f; var pi=$('pdfInfo'); pi.className='pi show'; pi.textContent='✅ 已拖入：'+f.name; }
}

function uploadPdf(stdId, file){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(e){ res(e.target.result.split(',')[1]); };
    r.onerror=rej; r.readAsDataURL(file);
  }).then(function(b64){
    return ghGet('/contents/downloads/'+stdId+'.pdf').then(function(ex){return ex.sha;}).catch(function(){return '';}).then(function(sha){
      var body={message:'📄 上传PDF: '+stdId, content:b64};
      if(sha) body.sha=sha;
      return ghPut('/contents/downloads/'+stdId+'.pdf', body);
    });
  });
}

// 导出
function doExport(){
  var today=new Date().toISOString().slice(0,10);
  var json={version:today.replace(/-/g,'.'), updated:today, total:DB.length, standards:DB};
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(json,null,2)],{type:'application/json'}));
  a.download='standards-'+today+'.json'; a.click();
  showToast('JSON 已导出','ok');
}

// 弹窗
function openMo(id){ $(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeMo(id){ $(id).classList.remove('open'); document.body.style.overflow=''; }
function bgClose(e,id){ if(e.target===$(id)) closeMo(id); }

// 同步标签
function setSyncLabel(cls, txt){ var el=$('syncLabel'); el.className='sync '+cls; el.textContent=txt; }

// Toast
var toastTmr;
function showToast(msg, cls){
  var el=$('toast'); el.textContent=msg;
  el.className='toast show'+(cls?' '+cls:'');
  clearTimeout(toastTmr);
  toastTmr=setTimeout(function(){el.classList.remove('show');},3000);
}

// HTML转义
function eh(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
