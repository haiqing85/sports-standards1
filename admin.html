<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体育标准管理后台</title>
  <style>
    :root{--bg:#f4f6f9;--white:#fff;--subtle:#f0f4f8;--border:#dde3ec;--border-l:#eaeff5;--blue:#2563eb;--blue-d:#1a56c4;--blue-dim:rgba(37,99,235,.08);--red:#dc2626;--red-dim:rgba(220,38,38,.08);--green:#16a34a;--green-dim:rgba(22,163,74,.09);--amber:#d97706;--amber-dim:rgba(217,119,6,.10);--text:#1e2a3b;--text2:#475569;--muted:#94a3b8;--sh:0 1px 4px rgba(30,42,59,.08);--sh-md:0 4px 16px rgba(30,42,59,.12);--r:8px;--font:"PingFang SC","Microsoft YaHei",sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
    .lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .lb{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:var(--sh-md)}
    .lb-logo{font-size:36px;text-align:center;margin-bottom:8px}
    .lb-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
    .lb-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
    .lb label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
    .lb input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;outline:none;font-family:var(--font);color:var(--text);background:var(--subtle);margin-bottom:14px}
    .lb input:focus{border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .lb .hint{font-size:12px;color:var(--muted);background:var(--subtle);border-radius:6px;padding:10px 13px;margin-bottom:16px;line-height:1.7}
    .lb .hint a{color:var(--blue);text-decoration:none}
    .lb .hint code{background:var(--border);border-radius:3px;padding:1px 5px;font-family:monospace}
    .btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)}
    .btn-login:hover{opacity:.9}
    .lerr{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none}
    .app{display:none;flex-direction:column;min-height:100vh}
    .app.visible{display:flex}
    .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
    .tbar-logo{font-size:17px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
    .tbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
    .sync-st{font-size:12px;padding:4px 11px;border-radius:20px;background:var(--subtle);color:var(--muted)}
    .sync-st.ok{background:var(--green-dim);color:var(--green)}
    .sync-st.err{background:var(--red-dim);color:var(--red)}
    .sync-st.saving{background:var(--amber-dim);color:var(--amber)}
    .btn-logout{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text2);font-size:13px;cursor:pointer}
    .btn-logout:hover{border-color:var(--red);color:var(--red)}
    .content{flex:1;padding:24px;max-width:1400px;margin:0 auto;width:100%}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px}
    .sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh)}
    .sc-n{font-size:28px;font-weight:700;line-height:1}
    .sc-l{font-size:11.5px;color:var(--muted);margin-top:4px}
    .sc.blue .sc-n{color:var(--blue)}.sc.green .sc-n{color:var(--green)}.sc.red .sc-n{color:var(--red)}.sc.amber .sc-n{color:var(--amber)}
    .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
    .sbox{flex:1;min-width:200px;max-width:340px;position:relative}
    .sbox input{width:100%;padding:8px 14px 8px 34px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;outline:none;font-family:var(--font);background:var(--white)}
    .sbox input:focus{border-color:var(--blue)}
    .sbox .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
    .fsel{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:var(--white);color:var(--text);font-family:var(--font);cursor:pointer}
    .btn{padding:8px 16px;border-radius:6px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
    .bp{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}.bp:hover{background:var(--blue-d)}
    .bs{background:var(--white);color:var(--text2);border:1px solid var(--border)}.bs:hover{border-color:var(--blue);color:var(--blue)}
    .bd{background:var(--red-dim);color:var(--red);border:1px solid #fecaca}.bd:hover{background:#fee2e2}
    .sm{padding:5px 10px;font-size:12px}
    .tw{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
    table{width:100%;border-collapse:collapse}
    th{background:var(--subtle);padding:10px 13px;text-align:left;font-size:11.5px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
    td{padding:10px 13px;border-bottom:1px solid var(--border-l);vertical-align:middle;font-size:13px}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafbfc}
    .tc{font-family:"Courier New",monospace;font-weight:700;color:var(--blue);font-size:11.5px;white-space:nowrap}
    .tt{font-weight:600;line-height:1.4;max-width:260px}
    .tt small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-top:1px}
    .tact{display:flex;gap:6px;white-space:nowrap}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .b\u56fd\u5bb6\u6807\u51c6{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .b\u884c\u4e1a\u6807\u51c6{background:#faf5ff;color:#7e22ce;border:1px solid #e9d5ff}
    .b\u5730\u65b9\u6807\u51c6{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .b\u56e2\u6807{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
    .b\u4f01\u4e1a\u6807\u51c6{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .b\u73b0\u884c{background:rgba(22,163,74,.09);color:#16a34a;border:1px solid #bbf7d0}
    .b\u5e9f\u6b62{background:rgba(220,38,38,.08);color:#dc2626;border:1px solid #fecaca}
    .b\u5373\u5c06\u5b9e\u65bd{background:var(--amber-dim);color:var(--amber);border:1px solid #fde68a}
    .pdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
    .py{background:var(--green)}.pn{background:#cbd5e1}
    .pager{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-top:1px solid var(--border-l);font-size:12.5px;color:var(--muted)}
    .pbtns{display:flex;gap:5px}
    .pb{width:32px;height:32px;border:1px solid var(--border);border-radius:5px;background:var(--white);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
    .pb:hover,.pb.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
    .pb.active{font-weight:700}
    .mo{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
    .mo.open{display:flex}
    .mbox{background:var(--white);border-radius:14px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .18s ease}
    @keyframes mIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-l);position:sticky;top:0;background:var(--white);z-index:1}
    .mhead h2{font-size:16px;font-weight:700}
    .mcl{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:var(--subtle);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
    .mcl:hover{background:var(--red);border-color:var(--red);color:#fff}
    .mbody{padding:20px}
    .mfoot{padding:12px 20px;border-top:1px solid var(--border-l);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--white)}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .ff{grid-column:1/-1}
    .fgrp{display:flex;flex-direction:column;gap:5px}
    .fgrp label{font-size:11.5px;font-weight:700;color:var(--text2);letter-spacing:.4px}
    .fgrp .req{color:var(--red)}
    .fgrp input,.fgrp select,.fgrp textarea{padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;outline:none;font-family:var(--font);color:var(--text);background:var(--white)}
    .fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .fgrp textarea{resize:vertical;min-height:78px}
    .rrow{display:flex;gap:18px;align-items:center;padding:7px 0}
    .rrow label{font-weight:400;font-size:13.5px;display:flex;align-items:center;gap:5px;cursor:pointer;letter-spacing:0}
    .dzone{border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
    .dzone:hover,.dzone.drag{border-color:var(--blue);background:var(--blue-dim)}
    .dzone p{font-size:12.5px;color:var(--muted);margin-top:6px}
    .pinfo{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--green-dim);border:1px solid #bbf7d0;border-radius:7px;margin-top:10px;font-size:13px;color:var(--green)}
    .dconf{background:var(--red-dim);border:1px solid #fecaca;border-radius:8px;padding:13px;margin-bottom:14px;font-size:13px;color:#b91c1c}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-md);z-index:999;display:none;animation:tIn .2s ease}
    .toast.ok{background:#16a34a}.toast.err{background:var(--red)}.toast.show{display:block}
    @keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty-i{font-size:38px;margin-bottom:12px}
    .empty h3{font-size:15px;color:var(--text2);margin-bottom:6px}

</style>
</head>
<body>

<div class="lw" id="lw">
  <div class="lb">

          <th>&#20998;&#31867;</th><th>&#29366;&#24577;</th><th>PDF</th><th>&#21457;&#24067;&#26085;&#26399;</th><th>&#25805;&#20316;</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="pager" id="pager"></div>
    </div>
  </div>
</div>

<div class="mo" id="emo" onclick="closeMoCheck(event,'emo')">
  <div class="mbox">
    <div class="mhead"><h2 id="mTitle">&#26032;&#22686;&#26631;&#20934;</h2><button class="mcl" onclick="closeMo('emo')">&#10005;</button></div>
    <div class="mbody">
      <div class="fg">
        <div class="fgrp"><label>&#26631;&#20934;&#32534;&#21495; <span class="req">*</span></label><input type="text" id="fCode" placeholder="&#22914; GB 36246-2018"></div>
        <div class="fgrp"><label>&#26631;&#20934;&#31867;&#22411; <span class="req">*</span></label>
          <select id="fType2"><option>&#22269;&#23478;&#26631;&#20934;</option><option>&#34892;&#19994;&#26631;&#20934;</option><option>&#22320;&#26041;&#26631;&#20934;</option><option>&#22242;&#26631;</option><option>&#20225;&#19994;&#26631;&#20934;</option></select></div>
        <div class="fgrp ff"><label>&#26631;&#20934;&#21517;&#31216;&#65288;&#20013;&#25991;&#65289;<span class="req">*</span></label><input type="text" id="fTitle" placeholder="&#22914; &#20013;&#23567;&#23398;&#21512;&#25104;&#26448;&#26009;&#38754;&#23618;&#36816;&#21160;&#22330;&#22320;"></div>
        <div class="fgrp ff"><label>&#26631;&#20934;&#21517;&#31216;&#65288;&#33521;&#25991;&#65289;</label><input type="text" id="fEng" placeholder="English title (optional)"></div>
        <div class="fgrp"><label>&#26631;&#20934;&#29366;&#24577; <span class="req">*</span></label>
          <select id="fStat2"><option>&#29616;&#34892;</option><option>&#24320;&#27490;</option><option>&#21363;&#23558;&#23454;&#26施;</option></select></div>
        <div class="fgrp"><label>&#26631;&#20934;&#20998;&#31867; <span class="req">*</span></label>
          <select id="fCat2"><option>&#21512;&#25104;&#26448;&#26009;&#38754;&#23618;</option><option>&#20154;&#36896;&#33609;&#22374;</option><option>&#31163;&#20809;&#29031;&#26126;</option><option>&#26408;&#22320;&#26495;</option><option>PVC&#36816;&#21160;&#22320;&#32118;</option><option>&#22260;&#32593;</option><option>&#20581;&#36523;&#36335;&#24452;</option><option>&#20307;&#32946;&#22120;&#26448;</option><option>&#39069;&#31192;&#22635;&#20805;&#26009;</option><option>&#28216;&#27888;&#22330;&#22320;</option><option>&#36816;&#21160;&#22320;&#26495;</option><option>&#22330;&#22320;&#35774;&#35745;</option><option>&#20307;&#32946;&#35774;&#26045;</option><option>&#32508;&#21512;</option></select></div>

        <div class="fgrp"><label>&#24320;&#27490;&#26085;&#26399;</label><input type="date" id="fADate"></div>
        <div class="fgrp"><label>&#21457;&#24067;&#26426;&#26500;</label><input type="text" id="fOrg" placeholder="&#22914; &#22269;&#23478;&#24066;&#22330;&#30418;&#31649;&#29702;&#24635;&#23616;"></div>
        <div class="fgrp"><label>&#26367;&#20195;&#26631;&#20934;</label><input type="text" id="fRep" placeholder="&#34987;&#26367;&#20195;&#30340;&#26087;&#26631;&#20934;&#32534;&#21495;"></div>
        <div class="fgrp"><label>&#34987;&#26367;&#20195;&#20026;</label><input type="text" id="fRepBy" placeholder="&#26367;&#20195;&#26412;&#26631;&#20934;&#30340;&#26032;&#26631;&#20934;&#32534;&#21495;"></div>

        <div class="fgrp ff"><label>&#36866;&#29992;&#33539;&#22260;</label><input type="text" id="fScope" placeholder="&#36866;&#29992;&#20110;&#8230;"></div>
        <div class="fgrp ff"><label>&#26631;&#20934;&#25688;&#35201; <span class="req">*</span></label><textarea id="fSum" rows="4" placeholder="&#35268;&#23450;&#20102;&#8230;&#30340;&#25216;&#26415;&#35201;&#27714;&#12289;&#35797;&#39564;&#26041;&#27861;&#12289;&#26816;&#39564;&#35268;&#21017;&#8230;"></textarea></div>
        <div class="fgrp ff">
          <label>&#19978;&#20256; PDF &#25991;&#20214;&#65288;&#21487;&#36873;&#65289;</label>

            <p>&#25991;&#20214;&#23558;&#33258;&#21160;&#19978;&#20256;&#33267;&#20179;&#24211; downloads/ &#30446;&#24405;&#65292;&#20379;&#29992;&#25143;&#19979;&#36733;</p>

    <div class="mfoot"><button class="btn bs" onclick="closeMo('emo')">&#21462;&#28040;</button><button class="btn bp" id="saveBtn" onclick="saveStd()">&#128190; &#20445;&#23384;&#26631;&#20934;</button></div>
  </div>
</div>

<div class="mo" id="dmo" onclick="closeMoCheck(event,'dmo')">
  <div class="mbox" style="max-width:440px">
    <div class="mhead"><h2>&#30830;&#35748;&#21024;&#38500;</h2><button class="mcl" onclick="closeMo('dmo')">&#10005;</button></div>
    <div class="mbody">
      <div class="dconf">&#9888;&#65039; &#27492;&#25805;&#20316;&#19981;&#21487;&#25764;&#37323;&#65281;&#30830;&#23450;&#35201;&#21024;&#38500;&#20197;&#19979;&#26631;&#20934;&#21543;&#65311;</div>
      <p style="font-size:14px;line-height:1.7"><strong id="dCode"></strong><br><span id="dTitle" style="color:var(--text2)"></span></p>
    </div>
    <div class="mfoot"><button class="btn bs" onclick="closeMo('dmo')">&#21462;&#28040;</button><button class="btn bd" onclick="doDelete()">&#128465; &#30830;&#35748;&#21024;&#38500;</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

let DB=[],FT=[],pg=1;
const PS=25;
let editId=null,delId=null,pdfFile=null,fileSha="";
const ge=id=>document.getElementById(id);
const v=id=>ge(id).value.trim();
const sv=(id,val)=>ge(id).value=val;
const ls=(k,v)=>localStorage.setItem("spa_"+k,v);
const lg=k=>localStorage.getItem("spa_"+k)||"";

function doLogin(){
  const u=v("ghUser"),r=v("ghRepo"),t=v("ghToken");
  if(!u||!r||!t){showErr("请填写所有字段");return;}
  GH={user:u,token:t,repo:r};ls("u",u);ls("r",r);
  setSt("saving","验证中…");
  loadData().then(()=>{ge("lw").style.display="none";ge("app").classList.add("visible");ge("lerr").style.display="none";}).catch(e=>{showErr("登录失败："+e.message);setSt("err","验证失败");});
}
function doLogout(){GH={user:"",token:"",repo:""};ge("lw").style.display="";ge("app").classList.remove("visible");ge("ghToken").value="";}
function showErr(m){const e=ge("lerr");e.textContent=m;e.style.display="block";}

document.addEventListener("DOMContentLoaded",()=>{
  const u=lg("u"),r=lg("r");if(u)ge("ghUser").value=u;if(r)ge("ghRepo").value=r;
  document.addEventListener("keydown",e=>{if(e.key==="Escape")["emo","dmo"].forEach(id=>{if(ge(id).classList.contains("open"))closeMo(id);});});
});

const apiB=()=>"https://api.github.com/repos/"+GH.user+"/"+GH.repo;
const hdr=()=({"Authorization":"token "+GH.token,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"});

async function ghGet(p){const r=await fetch(apiB()+p,{headers:hdr()});if(!r.ok)throw new Error("GitHub "+(await r.json()).message);return r.json();}
async function ghPut(p,body){const r=await fetch(apiB()+p,{method:"PUT",headers:hdr(),body:JSON.stringify(body)});if(!r.ok)throw new Error("GitHub "+(await r.json()).message);return r.json();}

async function loadData(){
  setSt("saving","加载中…");
  const f=await ghGet("/contents/data/standards.json");
  fileSha=f.sha;
  const raw=f.content.replace(/\n/g,"");
  const json=JSON.parse(decodeURIComponent(escape(atob(raw))));
  DB=json.standards||[];
  buildCatFilter();renderStats();renderTable();
  setSt("ok","已同步 "+DB.length+" 条");
}

async function saveToGH(){
  setSt("saving","保存中…");
  const today=new Date().toISOString().slice(0,10);
  const db={version:today.replace(/-/g,"."),updated:today,total:DB.length,standards:DB};
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(db,null,2))));
  const res=await ghPut("/contents/data/standards.json",{message:"✏️ 后台更新 "+today,content,sha:fileSha});
  fileSha=res.content.sha;
  setSt("ok","已保存 "+DB.length+" 条");
  toast("✅ 保存成功，网站约 1 分钟后更新","ok");
}

async function uploadPdf(id,file){
  if(!file)return;setSt("saving","上传PDF…");
  const content=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.readAsDataURL(file);});
  let sha="";try{const ex=await ghGet("/contents/downloads/"+id+".pdf");sha=ex.sha;}catch{}
  await ghPut("/contents/downloads/"+id+".pdf",{message:"📄 上传PDF: "+id,content,...(sha?{sha}:{})});
  toast("✅ PDF 已上传: "+id+".pdf","ok");
}

function setSt(cls,txt){const e=ge("syncSt");e.className="sync-st "+cls;e.textContent=txt;}
function buildCatFilter(){
  const cats=[...new Set(DB.map(s=>s.category))].sort();
  ge("fCat").innerHTML="<option value=''>全部分类</option>"+cats.map(c=>"<option>"+c+"</option>").join("");
}
function renderStats(){
  const t=DB.length,a=DB.filter(s=>s.status==="现行").length,ab=DB.filter(s=>s.status==="废止").length,p=DB.filter(s=>s.localFile).length;
  ge("stats").innerHTML=\`<div class="sc blue"><div class="sc-n">\${t}</div><div class="sc-l">收录标准</div></div><div class="sc green"><div class="sc-n">\${a}</div><div class="sc-l">现行有效</div></div><div class="sc red"><div class="sc-n">\${ab}</div><div class="sc-l">已废止</div></div><div class="sc amber"><div class="sc-n">\${p}</div><div class="sc-l">有PDF文件</div></div>\`;
}
function getFiltered(){
  const q=v("q").toLowerCase(),tp=v("fType"),cat=v("fCat"),st=v("fStat"),pdf=v("fPdf");
  return DB.filter(s=>{
    if(tp&&s.type!==tp)return false;if(cat&&s.category!==cat)return false;
    if(st&&s.status!==st)return false;if(pdf==="yes"&&!s.localFile)return false;if(pdf==="no"&&s.localFile)return false;
    if(q&&!(\`\${s.code} \${s.title} \${(s.tags||[]).join(" ")} \${s.summary||""}\`).toLowerCase().includes(q))return false;return true;
  });
}
function renderTable(){FT=getFiltered();pg=1;renderPage();}
function renderPage(){
  const tbody=ge("tbody");const sl=FT.slice((pg-1)*PS,pg*PS);
  if(!sl.length){tbody.innerHTML=\`<tr><td colspan="8"><div class="empty"><div class="empty-i">🔍</div><h3>未找到匹配的标准</h3></div></td></tr>\`;ge("pager").innerHTML="";return;}
  tbody.innerHTML=sl.map(s=>\`<tr>
    <td class="tc">\${eh(s.code)}</td>
    <td class="tt">\${eh(s.title)}<small>\${eh(s.issuedBy||"")}</small></td>
    <td><span class="badge b\${eh(s.type)}">\${eh(s.type)}</span></td>
    <td>\${eh(s.category||"—")}</td>
    <td><span class="badge b\${eh(s.status)}">\${eh(s.status)}</span></td>
    <td><span class="pdot \${s.localFile?"py":"pn"}"></span>\${s.localFile?"有":"缺"}</td>
    <td>\${s.issueDate||"—"}</td>
    <td class="tact"><button class="btn bs sm" onclick="openEdit('\${eh(s.id)}')">✏️ 编辑</button><button class="btn bd sm" onclick="openDel('\${eh(s.id)}')">🗑</button></td>
  </tr>\`).join("");
  const tot=Math.ceil(FT.length/PS);
  if(tot<=1){ge("pager").innerHTML=\`<span>共 \${FT.length} 条</span><span></span>\`;return;}
  let btns="";
  if(pg>1)btns+=\`<button class="pb" onclick="goPage(\${pg-1})">‹</button>\`;
  for(let i=1;i<=tot;i++){if(i===1||i===tot||Math.abs(i-pg)<=1)btns+=\`<button class="pb\${i===pg?" active":""}" onclick="goPage(\${i})">\${i}</button>\`;else if(Math.abs(i-pg)===2)btns+=\`<span style="padding:0 3px;color:var(--muted)">…</span>\`;}
  if(pg<tot)btns+=\`<button class="pb" onclick="goPage(\${pg+1})">›</button>\`;
  ge("pager").innerHTML=\`<span>共 \${FT.length} 条，第 \${pg}/\${tot} 页</span><div class="pbtns">\${btns}</div>\`;
}
function goPage(n){pg=n;renderPage();ge("tbody").closest(".tw").scrollIntoView({behavior:"smooth",block:"start"});}

function openAdd(){editId=null;pdfFile=null;ge("mTitle").textContent="新增标准";ge("saveBtn").textContent="💾 保存标准";clearForm();openMo("emo");}
function openEdit(id){
  const s=DB.find(x=>x.id===id);if(!s)return;
  editId=id;pdfFile=null;ge("mTitle").textContent="编辑标准";ge("saveBtn").textContent="💾 更新标准";
  sv("fCode",s.code||"");sv("fTitle",s.title||"");sv("fEng",s.english||"");
  sv("fType2",s.type||"国家标准");sv("fStat2",s.status||"现行");sv("fCat2",s.category||"综合");
  sv("fIDate",s.issueDate||"");sv("fImDate",s.implementDate||"");sv("fADate",s.abolishDate||"");
  sv("fOrg",s.issuedBy||"");sv("fRep",s.replaces||"");sv("fRepBy",s.replacedBy||"");
  sv("fTags",(s.tags||[]).join(", "));sv("fScope",s.scope||"");sv("fSum",s.summary||"");
  document.querySelectorAll("input[name='mand']").forEach(r=>r.checked=r.value===String(s.isMandatory));
  const pi=ge("pinfo");if(s.localFile){pi.style.display="flex";pi.textContent="✅ 已有PDF: "+s.localFile;}else pi.style.display="none";
  openMo("emo");
}
function clearForm(){
  ["fCode","fTitle","fEng","fIDate","fImDate","fADate","fOrg","fRep","fRepBy","fTags","fScope","fSum"].forEach(id=>sv(id,""));
  sv("fType2","国家标准");sv("fStat2","现行");sv("fCat2","合成材料面层");
  document.querySelector("input[name='mand'][value='false']").checked=true;
  ge("pinfo").style.display="none";ge("pfi").value="";
}
async function saveStd(){
  const code=v("fCode"),title=v("fTitle"),sum=v("fSum");
  if(!code||!title||!sum){toast("请填写标准编号、名称和摘要","err");return;}
  const newId=editId||code.replace(/[^A-Za-z0-9]/g,"").slice(0,30);
  const entry={id:newId,code,title,english:v("fEng"),type:v("fType2"),status:v("fStat2"),issueDate:v("fIDate")||null,implementDate:v("fImDate")||null,abolishDate:v("fADate")||null,replaces:v("fRep")||null,replacedBy:v("fRepBy")||null,issuedBy:v("fOrg"),category:v("fCat2"),tags:v("fTags").split(",").map(t=>t.trim()).filter(Boolean),summary:sum,isMandatory:document.querySelector("input[name='mand']:checked")?.value==="true",scope:v("fScope"),localFile:pdfFile?"downloads/"+newId+".pdf":(editId?(DB.find(s=>s.id===editId)?.localFile||null):null)};
  const btn=ge("saveBtn");btn.disabled=true;btn.textContent="保存中…";
  try{
    if(pdfFile)await uploadPdf(newId,pdfFile);
    if(editId){const i=DB.findIndex(s=>s.id===editId);if(i>=0)DB[i]=entry;}
    else{if(DB.find(s=>s.code.replace(/\s/g,"")===code.replace(/\s/g,""))){toast("❌ 标准编号已存在","err");return;}DB.unshift(entry);}
    await saveToGH();renderStats();buildCatFilter();renderTable();closeMo("emo");
    toast(editId?"✅ 标准已更新":"✅ 标准已新增","ok");
  }catch(e){toast("❌ 保存失败: "+e.message,"err");}
  finally{btn.disabled=false;btn.textContent=editId?"💾 更新标准":"💾 保存标准";}
}

function openDel(id){const s=DB.find(x=>x.id===id);if(!s)return;delId=id;ge("dCode").textContent=s.code;ge("dTitle").textContent=s.title;openMo("dmo");}
async function doDelete(){
  if(!delId)return;DB=DB.filter(s=>s.id!==delId);
  try{await saveToGH();renderStats();buildCatFilter();renderTable();closeMo("dmo");toast("🗑 已删除","ok");}
  catch(e){toast("❌ 删除失败: "+e.message,"err");}delId=null;
}

function handlePdfSel(e){const f=e.target.files[0];if(!f||!f.name.endsWith(".pdf")){toast("请选择 PDF 文件","err");return;}pdfFile=f;const pi=ge("pinfo");pi.style.display="flex";pi.textContent="✅ 已选择: "+f.name+" ("+(f.size/1024).toFixed(0)+" KB)";}
function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.name.endsWith(".pdf")){pdfFile=f;const pi=ge("pinfo");pi.style.display="flex";pi.textContent="✅ 已拖入: "+f.name;}}

function exportJson(){
  const today=new Date().toISOString().slice(0,10);const db={version:today.replace(/-/g,"."),updated:today,total:DB.length,standards:DB};
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:"application/json"}));a.download="standards-"+today+".json";a.click();toast("📥 JSON 已导出","ok");
}

function openMo(id){ge(id).classList.add("open");document.body.style.overflow="hidden";}
function closeMo(id){ge(id).classList.remove("open");document.body.style.overflow="";}
function closeMoCheck(e,id){if(e.target===ge(id))closeMo(id);}

let tt;
function toast(msg,cls){const e=ge("toast");e.textContent=msg;e.className="toast show "+(cls||"");clearTimeout(tt);tt=setTimeout(()=>e.classList.remove("show"),3200);}

function eh(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
</script>
</body>
</html>
