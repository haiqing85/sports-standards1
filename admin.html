<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub仓库文件管理后台</title>
    <style>
        /* 完全保留原有页面样式，无任何视觉改动 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            padding: 30px;
            background-color: #ffffff;
        }
        .container {
            max-width: 100%;
            background: #ffffff;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #222222;
            margin-bottom: 35px;
        }
        .config-box {
            background-color: #f8f9fa;
            border-radius: 6px;
            padding: 25px;
            margin-bottom: 35px;
        }
        .form-item {
            margin-bottom: 25px;
        }
        .form-item:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            font-size: 18px;
            color: #333333;
            margin-bottom: 10px;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #dddddd;
            border-radius: 4px;
            font-size: 16px;
            color: #333333;
            background-color: #ffffff;
        }
        input::placeholder, textarea::placeholder {
            color: #888888;
        }
        textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-read {
            background-color: #6c757d;
            color: #ffffff;
        }
        .btn-read:hover {
            background-color: #545b62;
        }
        .btn-save {
            background-color: #007bff;
            color: #ffffff;
        }
        .btn-save:hover {
            background-color: #0056b3;
        }
        .btn-clear {
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #dddddd;
        }
        .btn-clear:hover {
            background-color: #f5f5f5;
        }
        .tip-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            font-size: 15px;
        }
        .tip-success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        .tip-error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub仓库文件管理后台</h1>

        <!-- 完全保留原有配置区域结构 -->
        <div class="config-box">
            <div class="form-item">
                <label>管理员密码（必填）</label>
                <input type="password" id="adminPwd" placeholder="">
            </div>
            <div class="form-item">
                <label>仓库信息（格式：用户名/仓库名）</label>
                <input type="text" id="repoInfo" placeholder="比如：zhangsan/my-website">
            </div>
        </div>

        <!-- 完全保留原有文件操作区域结构 -->
        <div class="form-item">
            <label>仓库文件路径（必填）</label>
            <input type="text" id="filePath" placeholder="比如：index.html / docs/guide.md / static/img.png">
        </div>

        <div class="form-item">
            <label>文件内容</label>
            <textarea id="fileContent" placeholder="请输入要写入的文件内容，支持HTML、Markdown、纯文本等"></textarea>
        </div>

        <!-- 完全保留原有按钮组，操作习惯不变 -->
        <div class="btn-group">
            <button class="btn-read" onclick="loadFile()">读取文件</button>
            <button class="btn-save" onclick="saveFile()">保存提交</button>
            <button class="btn-clear" onclick="clearForm()">清空内容</button>
        </div>

        <div id="tipBox" class="tip-box"></div>
    </div>

    <script>
        // 代理接口地址，适配你的目录结构，无额外改动
        const PROXY_API = '/api/github-proxy';

        // 提示框方法，兼容原有逻辑
        function showTip(message, isSuccess = false) {
            const tipEl = document.getElementById('tipBox');
            tipEl.className = isSuccess ? 'tip-box tip-success' : 'tip-box tip-error';
            tipEl.innerText = message;
        }

        // 核心请求方法，仅替换底层逻辑，功能不变
        async function githubRequest(filePath, method, bodyData = null) {
            // 完全保留原有输入校验逻辑，和之前一致
            const adminPwd = document.getElementById('adminPwd').value.trim();
            const repoInfo = document.getElementById('repoInfo').value.trim();
            const targetPath = filePath.trim();

            if (!adminPwd) {
                showTip('请输入管理员密码', false);
                return null;
            }
            if (!repoInfo) {
                showTip('请输入仓库信息（格式：用户名/仓库名）', false);
                return null;
            }
            if (!targetPath) {
                showTip('请输入仓库文件路径', false);
                return null;
            }

            // 拼接代理请求地址，无硬编码Token，彻底解决失效问题
            const requestUrl = `${PROXY_API}/repos/${repoInfo}/contents/${targetPath}`;

            try {
                const requestOptions = {
                    method: method,
                    headers: {
                        'X-Admin-Password': adminPwd,
                        'Content-Type': 'application/json'
                    }
                };

                if (bodyData) {
                    requestOptions.body = JSON.stringify(bodyData);
                }

                const response = await fetch(requestUrl, requestOptions);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || '操作失败，请检查密码、仓库信息和文件路径');
                }

                return result;
            } catch (error) {
                showTip(`操作失败：${error.message}`, false);
                return null;
            }
        }

        // 读取文件功能，和原有操作逻辑完全一致
        async function loadFile() {
            const filePath = document.getElementById('filePath').value;
            const result = await githubRequest(filePath, 'GET');

            if (result) {
                // 修复base64解码兼容问题，解决中文乱码、文件类型报错
                try {
                    const content = decodeURIComponent(escape(atob(result.content)));
                    document.getElementById('fileContent').value = content;
                    showTip('文件读取成功', true);
                } catch (e) {
                    showTip('文件解码失败，不支持的文件类型', false);
                }
            }
        }

        // 保存提交功能，和原有操作逻辑完全一致，修复文件类型报错
        async function saveFile() {
            const filePath = document.getElementById('filePath').value;
            const fileContent = document.getElementById('fileContent').value;
            const commitMsg = 'admin后台更新文件'; // 保留原有提交说明，可按需修改

            // 先读取文件获取sha值，兼容原有更新逻辑
            const fileInfo = await githubRequest(filePath, 'GET');
            const fileSha = fileInfo ? fileInfo.sha : undefined;

            // 修复base64编码兼容问题，彻底解决「当前不支持该文件类型」报错
            try {
                const base64Content = btoa(unescape(encodeURIComponent(fileContent)));
                const bodyData = {
                    message: commitMsg,
                    content: base64Content
                };

                // 兼容已有文件更新逻辑
                if (fileSha) {
                    bodyData.sha = fileSha;
                }

                const result = await githubRequest(filePath, 'PUT', bodyData);
                if (result) {
                    showTip('文件提交成功！已同步到GitHub仓库', true);
                }
            } catch (e) {
                showTip('当前不支持该文件类型，请尝试其他文件', false);
            }
        }

        // 清空内容功能，和原有逻辑完全一致
        function clearForm() {
            document.getElementById('filePath').value = '';
            document.getElementById('fileContent').value = '';
            document.getElementById('tipBox').style.display = 'none';
        }
    </script>
</body>
</html>
