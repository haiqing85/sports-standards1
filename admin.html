<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体育标准数据库 - 管理后台</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* 登录页 */
        .login-screen { position: fixed; inset: 0; background: #1e293b; display: flex; align-items: center; justify-content: center; z-index: 999; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box h2 { margin-top: 0; margin-bottom: 6px; color: #0f172a; font-size: 20px; }
        .login-box .sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
        .login-box label { display: block; text-align: left; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .login-box input { width: 100%; padding: 11px 13px; margin-bottom: 14px; border: 1px solid #e2e8f0; border-radius: 7px; box-sizing: border-box; font-size: 14px; font-family: inherit; color: #1e293b; }
        .login-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
        .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 7px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; }
        .login-box button:hover { background: #1d4ed8; }
        .login-err { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 18px; }

        /* 主界面 */
        .container { max-width: 1100px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .header-bar h1 { margin: 0; font-size: 22px; color: #0f172a; }
        .header-btns { display: flex; gap: 10px; }
        .btn { padding: 9px 18px; border-radius: 7px; cursor: pointer; border: none; font-size: 14px; color: white; font-weight: 700; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-sync { background: #10b981; }
        .btn-sync:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: .6; cursor: not-allowed; }

        /* 搜索和筛选 */
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-bar input { flex: 1; min-width: 200px; padding: 9px 13px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13.5px; font-family: inherit; outline: none; color: #1e293b; }
        .search-bar input:focus { border-color: var(--primary); }
        .search-bar select { padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; color: #1e293b; cursor: pointer; background: white; }

        /* 列表 */
        .std-item { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f1f5f9; align-items: center; transition: background .15s; }
        .std-item:hover { background: #f8fafc; }
        .std-item:last-child { border-bottom: none; }
        .std-info-code { font-weight: 700; color: #0f172a; font-size: 15px; font-family: monospace; margin-bottom: 4px; }
        .std-info-title { font-size: 13.5px; color: #475569; margin-bottom: 8px; font-weight: 500; }
        .std-item-btns { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-right: 5px; }
        .badge-type  { background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .badge-mand  { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
        .badge-cat   { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .badge-ok    { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .badge-abol  { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-nopdf { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; border-radius: 20px; font-size: 11px; font-weight: 700; padding: 2px 8px; display: inline-flex; align-items: center; gap: 3px; }

        /* 弹窗 */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
        .modal.open { display: flex; }
        .modal-content { background: white; padding: 28px; border-radius: 12px; width: 560px; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: mup .18s ease; }
        @keyframes mup { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .modal-content h2 { margin-top: 0; margin-bottom: 20px; color: #0f172a; font-size: 18px; }

        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.4px; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 7px;
            box-sizing: border-box; font-family: inherit; font-size: 13.5px; color: #1e293b; background: white;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #f1f5f9; }

        /* 统计卡片 */
        .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 9px; padding: 14px 16px; text-align: center; cursor: pointer; transition: all .15s; user-select: none; }
        .stat-card:hover { border-color: #2563eb; box-shadow: 0 2px 10px rgba(37,99,235,.12); transform: translateY(-1px); }
        .stat-card.selected { border-width: 2px; box-shadow: 0 2px 10px rgba(37,99,235,.15); }
        .stat-card.total.selected  { border-color: #2563eb; background: #eff6ff; }
        .stat-card.active.selected { border-color: #16a34a; background: #f0fdf4; }
        .stat-card.abol.selected   { border-color: #dc2626; background: #fef2f2; }
        .stat-card.coming.selected { border-color: #d97706; background: #fffbeb; }
        .stat-card.nopdf.selected  { border-color: #ea580c; background: #fff7ed; }
        .stat-card .s-num { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
        .stat-card .s-lbl { font-size: 12px; color: #94a3b8; }
        .stat-card.total  .s-num { color: #2563eb; }
        .stat-card.active .s-num { color: #16a34a; }
        .stat-card.abol   .s-num { color: #dc2626; }
        .stat-card.coming .s-num { color: #d97706; }
        .stat-card.nopdf  .s-num { color: #ea580c; }
    </style>
</head>
<body>

<!-- 登录页 -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h2>🏟 体育标准管理后台</h2>
        <div class="sub">请输入管理员密码登录</div>
        <label>管理员密码</label>
        <input type="password" id="adminPwd" placeholder="请输入管理员密码"
            onkeydown="if(event.key==='Enter')handleLogin()">
        <button onclick="handleLogin()">登 录</button>
        <div class="login-err" id="loginErr"></div>
    </div>
</div>

<!-- 主界面 -->
<div class="container" id="adminScreen">
    <div class="header-bar">
        <h1>🏟 体育标准管理后台</h1>
        <div class="header-btns">
            <button class="btn btn-primary" onclick="openModal()">➕ 新增标准</button>
            <button class="btn btn-sync" onclick="syncToGithub()" id="syncBtn">☁️ 推送至 GitHub</button>
        </div>
    </div>

    <div id="statusText">正在加载数据…</div>

    <!-- 统计面板 -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-card total selected" onclick="filterByCard('')" title="点击查看全部标准">
            <div class="s-num" id="st-total">—</div><div class="s-lbl">收录标准（全部）</div>
        </div>
        <div class="stat-card active" onclick="filterByCard('现行')" title="点击查看现行标准">
            <div class="s-num" id="st-active">—</div><div class="s-lbl">现行有效</div>
        </div>
        <div class="stat-card abol" onclick="filterByCard('废止')" title="点击查看已废止标准">
            <div class="s-num" id="st-abol">—</div><div class="s-lbl">已废止</div>
        </div>
        <div class="stat-card coming" onclick="filterByCard('即将实施')" title="点击查看即将实施标准">
            <div class="s-num" id="st-coming">—</div><div class="s-lbl">即将实施</div>
        </div>
        <div class="stat-card nopdf" onclick="filterByCard('__nopdf__')" title="点击查看缺少PDF的标准">
            <div class="s-num" id="st-nopdf">—</div><div class="s-lbl">⚠️ 缺PDF</div>
        </div>
    </div>

    <!-- 搜索筛选 -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 搜索标准编号、名称…" oninput="renderList()">
        <select id="filterType" onchange="renderList()">
            <option value="">全部类型</option>
            <option>国家标准</option><option>行业标准</option>
            <option>地方标准</option><option>团标</option><option>企业标准</option>
        </select>
        <select id="filterStatus" onchange="window._filterNoPdf=false;renderList()">
            <option value="">全部状态</option>
            <option>现行</option><option>废止</option><option>即将实施</option>
        </select>
        <select id="filterCat" onchange="renderList()">
            <option value="">全部分类</option>
            <option>合成材料面层</option><option>人造草坪</option><option>灯光照明</option>
            <option>木地板</option><option>PVC运动地胶</option><option>围网</option>
            <option>健身路径</option><option>体育器材</option><option>颗粒填充料</option>
            <option>运动地板</option><option>场地设计</option><option>游泳场地</option>
            <option>综合</option>
        </select>
    </div>

    <div id="stdList"></div>
</div>

<!-- 新增/编辑标准弹窗 -->
<div class="modal" id="stdModal">
  <div class="modal-content">
    <h2 id="modalTitle">新增体育标准</h2>
    <input type="hidden" id="editId">
    
    <div class="input-group">
      <label>标准编号</label>
      <input type="text" id="stdCode" placeholder="如：GB/T 14833-2020">
    </div>

    <div class="input-group">
      <label>标准名称</label>
      <input type="text" id="stdTitle" placeholder="输入标准全称">
    </div>

    <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
      <div class="input-group">
        <label>标准类型</label>
        <select id="stdType">
          <option>国家标准</option>
          <option>行业标准</option>
          <option>地方标准</option>
          <option>团标</option>
          <option>企业标准</option>
        </select>
      </div>
      <div class="input-group">
        <label>实施状态</label>
        <select id="stdStatus">
          <option>现行</option>
          <option>废止</option>
          <option>即将实施</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>分类</label>
      <select id="stdCat">
        <option>合成材料面层</option>
        <option>人造草坪</option>
        <option>灯光照明</option>
        <option>木地板</option>
        <option>PVC运动地胶</option>
        <option>围网</option>
        <option>健身路径</option>
        <option>体育器材</option>
        <option>颗粒填充料</option>
        <option>运动地板</option>
        <option>场地设计</option>
        <option>游泳场地</option>
        <option>综合</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveStd()">保存</button>
    </div>
  </div>
</div>

<script>
  // 全局变量
  let stdList = [];
  let currentFilter = '';
  window._filterNoPdf = false;
  const API_BASE = '/api/admin'; // 边缘函数接口地址

  // ========== 核心登录逻辑（调用服务端接口，安全校验） ==========
  async function handleLogin() {
    const inputPwd = document.getElementById('adminPwd').value.trim();
    const loginErr = document.getElementById('loginErr');

    // 基础校验
    if (!inputPwd) {
      loginErr.textContent = '请输入管理员密码';
      return;
    }

    try {
      // 调用边缘函数接口，服务端校验密码（密码不会在前端暴露）
      const res = await fetch(`${API_BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: inputPwd })
      });

      const result = await res.json();

      if (res.ok && result.code === 0) {
        // 登录成功
        loginErr.textContent = '';
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        // 加载标准数据
        await loadStdData();
      } else {
        // 登录失败
        loginErr.textContent = result.msg || '密码错误，请重试';
      }
    } catch (err) {
      console.error('登录请求失败：', err);
      loginErr.textContent = '网络请求失败，请检查部署配置';
    }
  }

  // ========== 标准数据管理 ==========
  // 加载标准数据
  async function loadStdData() {
    const statusText = document.getElementById('statusText');
    try {
      statusText.textContent = '正在从GitHub加载数据...';
      const res = await fetch(`${API_BASE}/get-data`, { method: 'GET' });

      if (!res.ok) throw new Error('数据加载失败');
      const result = await res.json();
      
      stdList = result.data || [];
      updateStats();
      renderList();
      statusText.textContent = `加载完成，共 ${stdList.length} 条标准数据`;
    } catch (err) {
      statusText.textContent = `加载失败：${err.message}`;
      console.error('加载数据失败：', err);
    }
  }

  // 更新统计卡片
  function updateStats() {
    const total = stdList.length;
    const active = stdList.filter(item => item.status === '现行').length;
    const abol = stdList.filter(item => item.status === '废止').length;
    const coming = stdList.filter(item => item.status === '即将实施').length;
    const nopdf = stdList.filter(item => !item.pdfUrl).length;

    document.getElementById('st-total').textContent = total;
    document.getElementById('st-active').textContent = active;
    document.getElementById('st-abol').textContent = abol;
    document.getElementById('st-coming').textContent = coming;
    document.getElementById('st-nopdf').textContent = nopdf;
  }

  // 渲染标准列表
  function renderList() {
    const listEl = document.getElementById('stdList');
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const filterType = document.getElementById('filterType').value;
    const filterStatus = document.getElementById('filterStatus').value;
    const filterCat = document.getElementById('filterCat').value;

    // 筛选逻辑
    let filtered = stdList.filter(item => {
      const matchSearch = !searchVal || item.code.toLowerCase().includes(searchVal) || item.title.toLowerCase().includes(searchVal);
      const matchType = !filterType || item.type === filterType;
      const matchStatus = !filterStatus || item.status === filterStatus;
      const matchCat = !filterCat || item.cat === filterCat;
      const matchNoPdf = !window._filterNoPdf || !item.pdfUrl;
      const matchFilter = !currentFilter || item.status === currentFilter;
      return matchSearch && matchType && matchStatus && matchCat && matchNoPdf && matchFilter;
    });

    // 空列表处理
    if (filtered.length === 0) {
      listEl.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">暂无符合条件的标准数据</div>';
      return;
    }

    // 渲染列表项
    listEl.innerHTML = filtered.map(item => `
      <div class="std-item">
        <div class="std-info">
          <div class="std-info-code">${item.code}</div>
          <div class="std-info-title">${item.title}</div>
          <div>
            <span class="badge badge-type">${item.type}</span>
            <span class="badge ${item.status === '现行' ? 'badge-ok' : 'badge-abol'}">${item.status}</span>
            <span class="badge badge-cat">${item.cat}</span>
            ${!item.pdfUrl ? '<span class="badge-nopdf">⚠️ 无PDF</span>' : ''}
          </div>
        </div>
        <div class="std-item-btns">
          <button class="btn btn-primary" style="padding:6px 12px; font-size:12px;" onclick="editStd('${item.id}')">编辑</button>
          <button class="btn btn-danger" style="padding:6px 12px; font-size:12px;" onclick="deleteStd('${item.id}')">删除</button>
        </div>
      </div>
    `).join('');
  }

  // 按统计卡片筛选
  function filterByCard(filter) {
    currentFilter = filter;
    window._filterNoPdf = filter === '__nopdf__';
    document.getElementById('filterStatus').value = '';
    
    // 高亮选中卡片
    document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('selected'));
    const targetCard = filter === '' ? '.total' : filter === '__nopdf__' ? '.nopdf' : filter === '现行' ? '.active' : filter === '废止' ? '.abol' : '.coming';
    document.querySelector(`.stat-card${targetCard}`).classList.add('selected');

    renderList();
  }

  // ========== 弹窗操作 ==========
  function openModal(id) {
    const modal = document.getElementById('stdModal');
    const modalTitle = document.getElementById('modalTitle');
    modal.classList.add('open');

    // 编辑模式
    if (id) {
      const std = stdList.find(item => item.id === id);
      if (!std) return;
      modalTitle.textContent = '编辑体育标准';
      document.getElementById('editId').value = id;
      document.getElementById('stdCode').value = std.code;
      document.getElementById('stdTitle').value = std.title;
      document.getElementById('stdType').value = std.type;
      document.getElementById('stdStatus').value = std.status;
      document.getElementById('stdCat').value = std.cat;
    } else {
      // 新增模式
      modalTitle.textContent = '新增体育标准';
      document.getElementById('editId').value = '';
      document.getElementById('stdCode').value = '';
      document.getElementById('stdTitle').value = '';
      document.getElementById('stdType').value = '国家标准';
      document.getElementById('stdStatus').value = '现行';
      document.getElementById('stdCat').value = '综合';
    }
  }

  function closeModal() {
    document.getElementById('stdModal').classList.remove('open');
  }

  // 保存标准（新增/编辑）
  async function saveStd() {
    const editId = document.getElementById('editId').value;
    const newStd = {
      id: editId || Date.now().toString(),
      code: document.getElementById('stdCode').value.trim(),
      title: document.getElementById('stdTitle').value.trim(),
      type: document.getElementById('stdType').value,
      status: document.getElementById('stdStatus').value,
      cat: document.getElementById('stdCat').value,
      pdfUrl: ''
    };

    // 基础校验
    if (!newStd.code || !newStd.title) {
      alert('标准编号和名称不能为空');
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/save-data`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          data: editId ? stdList.map(item => item.id === editId ? newStd : item) : [...stdList, newStd]
        })
      });

      if (!res.ok) throw new Error('保存失败');
      
      // 重新加载数据
      await loadStdData();
      closeModal();
      alert('保存成功');
    } catch (err) {
      console.error('保存失败：', err);
      alert(`保存失败：${err.message}`);
    }
  }

  // 删除标准
  async function deleteStd(id) {
    if (!confirm('确定要删除这条标准吗？删除后不可恢复')) return;
    try {
      const newList = stdList.filter(item => item.id !== id);
      const res = await fetch(`${API_BASE}/save-data`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: newList })
      });

      if (!res.ok) throw new Error('删除失败');
      
      await loadStdData();
      alert('删除成功');
    } catch (err) {
      console.error('删除失败：', err);
      alert(`删除失败：${err.message}`);
    }
  }

  // 同步到GitHub
  async function syncToGithub() {
    if (!confirm('确定要将当前数据同步到GitHub仓库吗？')) return;
    const syncBtn = document.getElementById('syncBtn');
    syncBtn.disabled = true;
    syncBtn.textContent = '同步中...';

    try {
      const res = await fetch(`${API_BASE}/sync-github`, { method: 'POST' });
      if (!res.ok) throw new Error('同步失败');
      alert('同步到GitHub成功');
    } catch (err) {
      console.error('同步失败：', err);
      alert(`同步失败：${err.message}`);
    } finally {
      syncBtn.disabled = false;
      syncBtn.textContent = '☁️ 推送至 GitHub';
    }
  }

  // 页面加载默认选中全部
  window.onload = () => {
    document.querySelector('.stat-card.total').classList.add('selected');
  };
</script>
</body>
</html>
