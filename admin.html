<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>体育标准管理后台 - 增强优化版</title>
    <style>
        /* 样式简化，保留核心 */
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: system-ui; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .std-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #e2e8f0; align-items: center; }
        .std-item:hover { background: #f1f5f9; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-upload { background: #10b981; color: white; }
        .input-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; margin-top: 5px; }
        .id-preview { font-size: 12px; color: #64748b; margin-top: 4px; }
        .status-ok { color: #10b981; font-size: 12px; }
        .status-err { color: #ef4444; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>标准数据库管理</h1>
        <div>
            <button class="btn btn-primary" onclick="openModal()">➕ 新增标准</button>
            <button class="btn" onclick="syncToGithub()" id="syncBtn">☁️ 同步到 GitHub</button>
        </div>
    </div>

    <div id="stats" style="margin-bottom: 10px; color: #64748b;">正在加载数据...</div>
    <div id="list"></div>
</div>

<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:12px; width:500px; max-height:90vh; overflow-y:auto;">
        <h2 id="modalTitle">编辑标准</h2>
        <div class="input-group">
            <label>标准编号 (Code) - <small>如 GB/T 14833-2011</small></label>
            <input type="text" id="f_code" oninput="autoGenId(this.value)" placeholder="请输入完整编号">
        </div>
        <div class="input-group">
            <label>系统内部 ID (自动生成，请勿改动)</label>
            <input type="text" id="f_id" readonly style="background:#f1f5f9">
            <div class="id-preview">对应的文件名应为: <span id="f_filename" style="color:red;font-weight:bold;">-</span></div>
        </div>
        <div class="input-group">
            <label>标准名称 (Title)</label>
            <input type="text" id="f_title">
        </div>
        <div class="input-group">
            <label>分类</label>
            <select id="f_type">
                <option value="国家标准">国家标准</option>
                <option value="行业标准">行业标准</option>
                <option value="地方标准">地方标准</option>
                <option value="团体标准">团体标准</option>
            </select>
        </div>
        <div class="input-group">
            <label>上传 PDF 文件</label>
            <input type="file" id="f_file" accept=".pdf">
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-primary" onclick="saveData()">保存并准备上传</button>
            <button class="btn" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
    let DB = { standards: [] };
    const GITHUB_CONFIG = {
        token: '你的GITHUB_TOKEN', // 建议通过环境变量或登录框输入
        repo: '你的用户名/仓库名',
        path: 'data/standards.json'
    };

    // 核心优化：ID 生成规则与爬虫强制统一
    function autoGenId(code) {
        if(!code) return;
        // 规则：去除空格、斜杠、点、横杠，转大写
        const id = code.replace(/[\s\/\.\-]/g, '').toUpperCase();
        document.getElementById('f_id').value = id;
        document.getElementById('f_filename').innerText = id + '.pdf';
    }

    async function loadData() {
        const resp = await fetch('data/standards.json?t=' + Date.now());
        DB = await resp.json();
        renderList();
    }

    function renderList() {
        const list = document.getElementById('list');
        document.getElementById('stats').innerText = `共 ${DB.standards.length} 条标准`;
        list.innerHTML = DB.standards.map(s => `
            <div class="std-item">
                <div>
                    <div style="font-weight:bold">${s.code}</div>
                    <div style="font-size:13px; color:#64748b">${s.title}</div>
                </div>
                <div style="display:flex; gap:8px; align-items:center;">
                    <span class="${s.localFile ? 'status-ok' : 'status-err'}">
                        ${s.localFile ? '● 有文件' : '○ 缺文件'}
                    </span>
                    <button class="btn" onclick="editStd('${s.id}')">编辑</button>
                    <button class="btn" style="color:red" onclick="deleteStd('${s.id}')">删除</button>
                </div>
            </div>
        `).join('');
    }

    // 保存逻辑：不仅更新 JSON，还处理文件名关联
    async function saveData() {
        const id = document.getElementById('f_id').value;
        const code = document.getElementById('f_code').value;
        const fileInput = document.getElementById('f_file');
        
        const newStd = {
            id: id,
            code: code,
            title: document.getElementById('f_title').value,
            type: document.getElementById('f_type').value,
            localFile: `downloads/${id}.pdf`, // 强制指向规范化的文件名
            updated: new Date().toISOString().slice(0,10)
        };

        const idx = DB.standards.findIndex(s => s.id === id);
        if(idx > -1) DB.standards[idx] = {...DB.standards[idx], ...newStd};
        else DB.standards.unshift(newStd);

        // 如果选择了文件，可以在此处通过 GitHub API 直接上传（需额外逻辑）
        // 这里先处理 JSON 的本地保存/预览
        renderList();
        closeModal();
        alert('修改已记录，请点击上方“同步到 GitHub”生效');
    }

    // 弹窗控制
    function openModal() { document.getElementById('modal').style.display='flex'; }
    function closeModal() { document.getElementById('modal').style.display='none'; }
    
    function editStd(id) {
        const s = DB.standards.find(x => x.id === id);
        if(!s) return;
        document.getElementById('f_code').value = s.code;
        document.getElementById('f_id').value = s.id;
        document.getElementById('f_title').value = s.title;
        document.getElementById('f_type').value = s.type;
        document.getElementById('f_filename').innerText = s.id + '.pdf';
        openModal();
    }

    // 初始化
    loadData();
</script>
</body>
</html>
