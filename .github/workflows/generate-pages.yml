name: 生成静态详情页与Sitemap

# 触发条件：
#   ① push: 当 data/standards.json 发生变化时自动触发（无论是后台推送还是CNB爬虫同步）
#   ② workflow_dispatch: 支持手动触发，也供 admin.html 后台按钮通过 API 远程触发
on:
  push:
    branches: [main]
    paths:
      - 'data/standards.json'   # 自动触发：后台推送数据时
      - 'data/.trigger'         # 手动触发：后台点"立即触发生成"按钮时
  workflow_dispatch: {}         # 保留：有 workflow 权限的 token 也可用

# 防止同一时间有多个生成任务并发执行导致提交冲突
concurrency:
  group: generate-static-pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 自动检测并修复系统ID冲突
        run: node scripts/dedupe-ids.js

      - name: 生成静态详情页 + sitemap.xml + robots.txt
        run: node scripts/generate-static-pages.js

      - name: 提交并推送变更（若有改动）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add s/ sitemap.xml robots.txt data/standards.json
          if git diff --staged --quiet; then
            echo "📭 没有需要提交的变更（静态页内容与上次一致）"
            exit 0
          fi
          git commit -m "🤖 自动生成静态详情页与sitemap（如有ID冲突已自动修复）[skip ci]"

          # ⚠️ 推送前必须 pull --rebase：若期间 main 分支有其它提交（如后台并发推送数据），
          #    直接 push 会因 non-fast-forward 被拒绝且无重试，导致本次生成静默失败。
          #    加最多3次重试，每次失败后重新拉取+变基再推送。
          for i in 1 2 3; do
            if git push; then
              echo "✅ 已提交并推送变更"
              exit 0
            fi
            echo "⚠️ 推送失败（第 $i 次），尝试 pull --rebase 后重试…"
            git pull --rebase origin main
          done
          echo "❌ 推送重试3次仍失败，请检查仓库状态"
          exit 1
