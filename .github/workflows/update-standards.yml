name: 自动抓取更新体育标准数据库

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4 # 升级到 v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.12'
          # 注意：这里去掉了 cache 选项，避免它因为找不到文件而报错

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫脚本
        run: python scripts/update_standards.py  # 注意：这里要加上文件夹路径和正确的文件名

      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          if [[ -n $(git status -s) ]]; then
            git add data.json
            git commit -m "🤖 自动更新标准库状态"
            git push
          else
            echo "没有发现新变动"
          fi
