name: 自动抓取更新体育标准数据库

on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00) 自动触发
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - check
          - pdf

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests urllib3

      - name: 完整抓取
        if: ${{ github.event.inputs.mode == 'full' || github.event.inputs.mode == '' }}
        run: python scripts/update_standards.py
        timeout-minutes: 40

      - name: 仅核查状态
        if: ${{ github.event.inputs.mode == 'check' }}
        run: python scripts/update_standards.py --check
        timeout-minutes: 15

      - name: 下载 PDF
        if: ${{ github.event.inputs.mode == 'pdf' }}
        run: python scripts/download_pdfs.py
        timeout-minutes: 60

      - name: 检查变更并提交
        run: |
          git config user.name "Standards Bot"
          git config user.email "bot@github-actions.com"
          git add data/standards.json data/update_log.txt 2>/dev/null || git add data/standards.json
          git diff --cached --quiet \
            && echo "今天暂无新标准发布" \
            || git commit -m "🤖 自动抓取更新 $(date '+%Y-%m-%d')" && git push
