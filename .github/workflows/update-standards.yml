name: 自动抓取更新体育标准数据库

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - builtin
          - check
          - pdf

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests urllib3

      - name: 完整抓取（内置数据 + 在线补充）
        if: ${{ github.event.inputs.mode == 'full' || github.event.inputs.mode == '' }}
        run: python scripts/update_standards.py
        timeout-minutes: 45

      - name: 仅导入内置权威数据
        if: ${{ github.event.inputs.mode == 'builtin' }}
        run: python scripts/update_standards.py --builtin
        timeout-minutes: 5

      - name: 核查标准状态
        if: ${{ github.event.inputs.mode == 'check' }}
        run: python scripts/update_standards.py --check
        timeout-minutes: 20

      - name: 下载缺失 PDF 文件
        if: ${{ github.event.inputs.mode == 'pdf' }}
        run: python scripts/download_pdfs.py
        timeout-minutes: 60

      - name: 提交变更
        run: |
          git config user.name "Standards Bot"
          git config user.email "bot@github-actions.com"
          git add data/standards.json
          git add data/update_log.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "数据无变化，无需提交"
          else
            TODAY=$(date '+%Y-%m-%d')
            git commit -m "🤖 自动更新 $TODAY"
            git push
          fi
