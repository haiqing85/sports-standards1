name: 自动抓取更新体育标准数据库

on:
  schedule:
    - cron: '0 3 * * 3'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - check
          - pdf

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests urllib3

      - name: 完整抓取
        if: ${{ github.event.inputs.mode == 'full' || github.event.inputs.mode == '' }}
        run: python scripts/update_standards.py
        timeout-minutes: 40

      - name: 仅核查状态
        if: ${{ github.event.inputs.mode == 'check' }}
        run: python scripts/update_standards.py --check
        timeout-minutes: 15

      - name: 下载PDF
        if: ${{ github.event.inputs.mode == 'pdf' }}
        run: python scripts/download_pdfs.py
        timeout-minutes: 60

      - name: 检查变更并提交
        run: |
          git config user.name "Standards Bot"
          git config user.email "bot@github-actions.com"
          git add -A
          git diff --cached --quiet || git commit -m "🔄 自动更新 $(date '+%Y-%m-%d')" && git push || echo "无变化"
