# 腾讯 EdgeOne Pages 部署配置
# 文档：https://edgeone.ai/document/162227731369361408

[build]
  # 纯静态站点，无需构建命令
  command = ""
  publish = "."

[[headers]]
  for = "/data/standards.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=600"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/standards/:code"
  to = "/?code=:code"
  status = 301
